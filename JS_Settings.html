<script>
// ── Settings Page ────────────────────────────────────────────────────────────

function showToast(msg, type) { showNotification(msg, type || 'success'); }

function loadSettings() {
  google.script.run
    .withSuccessHandler(function(r) {
      if (!r || !r.success) return;
      document.getElementById('wa-enabled').checked          = !!r.enabled;
      document.getElementById('wa-token').value              = r.token         || '';
      document.getElementById('wa-phone-number-id').value    = r.phoneNumberId || '';
      document.getElementById('wa-target').value             = r.target        || '';
      _updateWAEnabledLabel(!!r.enabled);
    })
    .withFailureHandler(function() {})
    .getWAConfig();
}

function _updateWAEnabledLabel(enabled) {
  var label = document.getElementById('wa-enabled-label');
  var knob  = document.getElementById('wa-toggle-knob');
  if (!label) return;
  if (enabled) {
    label.textContent = 'Aktif';
    label.className   = 'text-xs font-bold text-emerald-500';
    if (knob) knob.style.transform = 'translateX(20px)';
  } else {
    label.textContent = 'Nonaktif';
    label.className   = 'text-xs font-bold text-slate-400';
    if (knob) knob.style.transform = '';
  }
}

function onWAEnabledChange() {
  _updateWAEnabledLabel(document.getElementById('wa-enabled').checked);
}

function toggleWATokenVisibility() {
  var input = document.getElementById('wa-token');
  var icon  = document.getElementById('wa-token-eye');
  if (!input) return;
  if (input.type === 'password') {
    input.type = 'text';
    if (icon) icon.className = 'fa-solid fa-eye-slash text-sm';
  } else {
    input.type = 'password';
    if (icon) icon.className = 'fa-solid fa-eye text-sm';
  }
}

function simpanWAConfig() {
  var enabled       = document.getElementById('wa-enabled').checked;
  var token         = (document.getElementById('wa-token').value           || '').trim();
  var phoneNumberId = (document.getElementById('wa-phone-number-id').value || '').trim();
  var target        = (document.getElementById('wa-target').value          || '').trim();

  if (!token || !phoneNumberId || !target) {
    showToast('Access Token, Phone Number ID, dan Nomor Tujuan wajib diisi.', 'error');
    return;
  }

  var btn = document.querySelector('[onclick="simpanWAConfig()"]');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xs"></i> Menyimpan...'; }

  google.script.run
    .withSuccessHandler(function(r) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk text-xs"></i> Simpan'; }
      showToast((r && r.message) || (r && r.success ? 'Tersimpan.' : 'Gagal menyimpan.'), r && r.success ? 'success' : 'error');
    })
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk text-xs"></i> Simpan'; }
      showToast('Error: ' + e.message, 'error');
    })
    .saveWAConfig({ enabled: enabled, token: token, phoneNumberId: phoneNumberId, target: target });
}

function testWAConfig() {
  var token         = (document.getElementById('wa-token').value           || '').trim();
  var phoneNumberId = (document.getElementById('wa-phone-number-id').value || '').trim();
  var target        = (document.getElementById('wa-target').value          || '').trim();

  if (!token || !phoneNumberId || !target) {
    showToast('Isi Access Token, Phone Number ID, dan Nomor Tujuan terlebih dahulu.', 'error');
    return;
  }

  var btn = document.getElementById('wa-test-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-sm"></i> Mengirim...'; }

  google.script.run
    .withSuccessHandler(function(r) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-brands fa-whatsapp text-sm"></i> Kirim Test'; }
      showToast((r && r.message) || (r && r.success ? 'Terkirim!' : 'Gagal.'), r && r.success ? 'success' : 'error');
    })
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-brands fa-whatsapp text-sm"></i> Kirim Test'; }
      showToast('Error: ' + e.message, 'error');
    })
    .testWANotif({ token: token, phoneNumberId: phoneNumberId, target: target });
}
</script>
