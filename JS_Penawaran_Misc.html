<script>
    function bukaTambahPenawaran() {
      // Jika sedang dalam edit mode, reset dulu sepenuhnya
      if (window._editMode) {
        window._editMode = null;
        document.getElementById('btnSubmitForm').innerHTML =
          '<i class="fa-solid fa-floppy-disk text-sky-300"></i> Simpan Penawaran Ke Database';
      }
      // Reset form ke kondisi bersih
      resetFormQuotation();
      // Tampilkan form
      toggleFormPenawaran(true);
    }

    function formatModalProdukHarga(el) {
      el.value = formatNominalRupiah(pN(el.value));
    }

    function formatModalProdukHpp(el) {
      el.value = formatNominalRupiah(pN(el.value));
    }

    function formatEditProdukHarga(el) {
      el.value = formatNominalRupiah(pN(el.value));
    }

    function formatEditProdukHpp(el) {
      el.value = formatNominalRupiah(pN(el.value));
    }
</script>
