<script>
    // ================================================================
    // FITUR INVOICE
    // ================================================================
    let _invoiceWOList   = [];
    let _invoiceNextNo   = '';
    let _cachedInvoiceData = [];
    let _invoiceEditId   = null;   // null = mode buat, isi = mode edit
    let _invoiceEditDpp  = 0;      // dpp lama (untuk koreksi sisa saat edit)
    const _BANK_DEFAULT  = 'Bank BSI 7336418717\nA/N. PT. Renus Global Indonesia';

    // ── Helper tanggal yyyy-mm-dd → dd/MM/yyyy ──
    function _toDDMMYYYY(str) {
      if (!str) return '';
      const p = str.split('-');
      return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : str;
    }
    function _jenisBadge(j) {
      const map = {
        'DP':        'bg-amber-100 text-amber-700',
        'Termin':    'bg-blue-100 text-blue-700',
        'Pelunasan': 'bg-violet-100 text-violet-700',
        'Penuh':     'bg-emerald-100 text-emerald-800'
      };
      return map[j] || 'bg-slate-100 text-slate-600';
    }

    // ── Aging helpers (shared across modules) ──
    function _agingDays(tglStr) {
      if (!tglStr) return null;
      const p = tglStr.toString().split('/');
      if (p.length !== 3) return null;
      const d = new Date(parseInt(p[2],10), parseInt(p[1],10)-1, parseInt(p[0],10));
      if (isNaN(d)) return null;
      return Math.floor((Date.now() - d.getTime()) / 86400000);
    }
    function _agingBadge(days) {
      if (days === null || days < 0) return '';
      if (days > 90) return `<span class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700"><i class="fa-solid fa-circle-exclamation"></i>${days}h &gt;90</span>`;
      if (days > 60) return `<span class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-orange-100 text-orange-700"><i class="fa-solid fa-triangle-exclamation"></i>${days}h &gt;60</span>`;
      if (days > 30) return `<span class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700"><i class="fa-solid fa-clock"></i>${days}h &gt;30</span>`;
      return '';
    }

    // ── List ──
    function _pgRenderInvoice(data) {
      const tbody = document.getElementById('table-invoice');
      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-400">
          <i class="fas fa-file-invoice mr-2"></i>Belum ada invoice. Klik <b>Buat Invoice</b> untuk menagih Work Order.
        </td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(i => {
        const itemJson = JSON.stringify(i).replace(/'/g, "&#39;");
        const isLunas = i.statusBayar === 'Lunas';
        const bayarClass = isLunas ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-700';
        const agingBadge = !isLunas ? _agingBadge(_agingDays(i.tanggal)) : '';
        const kwBtn = i.kwitansiId
          ? `<button onclick='exportKwitansiPDFDariInvoice("${i.kwitansiId}",${itemJson})'
               class="text-emerald-600 hover:bg-emerald-50 p-1.5 rounded-lg transition"
               title="Export PDF Kwitansi (${i.kwitansiId})">
               <i class="fa-solid fa-receipt"></i>
             </button>`
          : '';
        return `<tr class="border-b border-slate-100 hover:bg-slate-50 transition text-sm ${isLunas ? 'bg-emerald-50/30' : ''}">
          <td class="p-4 max-w-[200px]">
            <p class="font-bold text-blue-700 whitespace-nowrap">${i.id}</p>
            <p class="text-[11px] text-slate-400 font-medium">${i.tanggal || ''}</p>
            ${agingBadge ? `<div class="mt-1">${agingBadge}</div>` : ''}
            ${i.kwitansiId ? `<p class="text-[10px] text-emerald-600 font-semibold mt-0.5"><i class="fa-solid fa-receipt mr-1"></i>${i.kwitansiId}</p>` : ''}
          </td>
          <td class="p-4">
            <p class="font-semibold text-emerald-700 text-xs whitespace-nowrap"><i class="fa-solid fa-clipboard-check text-[10px]"></i> ${i.noWO}</p>
            <p class="text-[11px] text-slate-400">${i.noPenawaran}</p>
          </td>
          <td class="p-4 max-w-[220px]">
            <p class="text-[11px] text-slate-400 font-medium truncate">${i.namaKlien}</p>
            <p class="font-semibold text-slate-700 truncate">${i.namaProject}</p>
          </td>
          <td class="p-4 text-center"><span class="text-[11px] font-bold px-2 py-1 rounded-lg ${_jenisBadge(i.jenis)}">${i.jenis}${i.persen ? ' '+i.persen+'%' : ''}</span></td>
          <td class="p-4 text-right font-bold text-slate-800 whitespace-nowrap">Rp ${i.total.toLocaleString('id-ID')}</td>
          <td class="p-4 text-center">
            <select onchange="ubahStatusBayarInvoice('${i.id}', this)"
              class="text-[11px] font-bold px-2 py-1 rounded-lg border-0 outline-none cursor-pointer ${bayarClass}">
              <option value="Belum Lunas" ${!isLunas?'selected':''}>Belum Lunas</option>
              <option value="Lunas" ${isLunas?'selected':''}>Lunas</option>
            </select>
          </td>
          <td class="p-4 text-center">
            <div class="flex items-center justify-center gap-1">
              <button onclick='bukaModalEditInvoice(${itemJson})' class="text-blue-600 hover:bg-blue-50 p-1.5 rounded-lg transition" title="Edit Invoice">
                <i class="fa-solid fa-pen-to-square"></i>
              </button>
              <button onclick='exportInvoicePDF(${itemJson})' class="text-red-500 hover:bg-red-50 p-1.5 rounded-lg transition" title="Export PDF Invoice">
                <i class="fa-solid fa-file-pdf"></i>
              </button>
              ${kwBtn}
              <button onclick="konfirmasiHapus('invoice','${i.id}','${i.id}')" class="text-rose-500 hover:bg-rose-50 p-1.5 rounded-lg transition" title="Hapus">
                <i class="fa-regular fa-trash-can"></i>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    window.loadInvoice = function() {
      const tbody = document.getElementById('table-invoice');
      if (tbody) tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat data invoice...</td></tr>`;
      if (typeof google !== 'undefined') {
        google.script.run.withSuccessHandler(function(data) {
          _cachedInvoiceData = data || [];
          const s = document.getElementById('search-invoice'); if (s) s.value = '';
          _pgState.invoice.data = _cachedInvoiceData;
          _pgState.invoice.page = 1;
          _injectPgBar('invoice', '#table-invoice');
          _pgRender('invoice');
        }).getInvoiceList();
      }
    };

    window.filterInvoice = function() {
      const q = (document.getElementById('search-invoice').value || '').toLowerCase().trim();
      _pgState.invoice.data = _cachedInvoiceData.filter(d => {
        if (!q) return true;
        return (d.id + d.noWO + d.noPenawaran + d.namaKlien + d.namaProject + d.jenis).toLowerCase().includes(q);
      });
      _pgState.invoice.page = 1;
      _pgRender('invoice');
    };

    // ── Form Buat Invoice ──
    function bukaModalBuatInvoice(preSelectNoWO) {
      toggleLoader(true, 'Memuat Work Order...');
      google.script.run.withSuccessHandler(function(res) {
        toggleLoader(false);
        if (!res.success) { showNotification('Gagal memuat data: ' + (res.error || ''), 'error'); return; }
        _invoiceEditId = null;
        _invoiceEditDpp = 0;
        _invoiceWOList = res.woList || [];
        _invoiceNextNo = res.nextNo || '';
        document.getElementById('inv-modal-title').innerText = 'Buat Invoice Baru';
        document.getElementById('inv-submit-btn').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Simpan Invoice';
        document.getElementById('inv-nomor-preview').innerText = _invoiceNextNo;

        const sel = document.getElementById('inv-wo');
        sel.disabled = false;
        sel.innerHTML = '<option value="">-- Pilih Work Order --</option>';
        _invoiceWOList.forEach(w => {
          if (w.sisaDpp > 0) sel.add(new Option(`${w.noWO} — ${w.namaKlien} (sisa Rp ${Math.round(w.sisaDpp).toLocaleString('id-ID')})`, w.noWO));
        });

        // Reset form
        document.getElementById('inv-wo').value = '';
        document.getElementById('inv-wo-info').classList.add('hidden');
        document.getElementById('inv-jenis').value = 'DP';
        document.getElementById('inv-persen').value = 30;
        document.getElementById('inv-nominal').value = '';
        document.getElementById('inv-ada-po').checked = false;
        document.getElementById('inv-nopo').value = '';
        document.getElementById('inv-tanggal').valueAsDate = new Date();
        document.getElementById('inv-tglpo').value = '';
        document.getElementById('inv-catatan').value = '';
        document.getElementById('inv-bank').value = _BANK_DEFAULT;
        document.getElementById('inv-po-penawaran').innerText = '-';
        document.getElementById('inv-scope').innerHTML =
          '<p class="text-slate-400 italic">Pilih Work Order untuk menampilkan scope.</p>';
        onInvoicePOToggle();
        if (preSelectNoWO) {
          document.getElementById('inv-wo').value = preSelectNoWO;
          onInvoiceWOChange();
        }
        onInvoiceJenisChange();
        hitungInvoice();

        document.getElementById('modal-invoice').classList.remove('hidden');
      }).withFailureHandler(function(err) {
        toggleLoader(false);
        showNotification('Gagal: ' + (err.message || err), 'error');
      }).getInvoiceInitialData();
    }

    // ── Form Edit Invoice ──
    window.bukaModalEditInvoice = function(item) {
      toggleLoader(true, 'Memuat data invoice...');
      google.script.run.withSuccessHandler(function(res) {
        toggleLoader(false);
        if (!res.success) { showNotification('Gagal memuat data: ' + (res.error || ''), 'error'); return; }
        _invoiceEditId  = item.id;
        _invoiceEditDpp = item.dpp || 0;
        _invoiceWOList  = res.woList || [];
        document.getElementById('inv-modal-title').innerText = 'Edit Invoice';
        document.getElementById('inv-submit-btn').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Update Invoice';
        document.getElementById('inv-nomor-preview').innerText = item.id;

        // Pastikan WO invoice ada di dropdown meski sisa 0 (karena sedang diedit)
        const sel = document.getElementById('inv-wo');
        sel.innerHTML = '<option value="">-- Pilih Work Order --</option>';
        _invoiceWOList.forEach(w => {
          sel.add(new Option(`${w.noWO} — ${w.namaKlien}`, w.noWO));
        });
        sel.value = item.noWO;
        sel.disabled = true; // WO tidak boleh diubah saat edit

        // Muat info & scope WO
        onInvoiceWOChange();

        // Pre-fill nilai dari invoice
        document.getElementById('inv-jenis').value = item.jenis || 'DP';
        document.getElementById('inv-tanggal').value = _toISO(item.tanggal);
        document.getElementById('inv-catatan').value = item.catatan || '';
        document.getElementById('inv-bank').value = item.bankAccount || _BANK_DEFAULT;

        // PO: jika noPO != noPenawaran → ada PO
        const adaPO = item.noPO && item.noPO !== item.noPenawaran;
        document.getElementById('inv-ada-po').checked = !!adaPO;
        document.getElementById('inv-nopo').value = adaPO ? item.noPO : '';
        document.getElementById('inv-tglpo').value = adaPO ? _toISO(item.tglPO) : '';
        onInvoicePOToggle();

        // Nominal & persen
        onInvoiceJenisChange();
        document.getElementById('inv-nominal').value = formatNominalRupiah(item.dpp || 0);
        onInvoiceNominalInput(); // sinkronkan persen dari nominal

        document.getElementById('modal-invoice').classList.remove('hidden');
      }).withFailureHandler(function(err) {
        toggleLoader(false);
        showNotification('Gagal: ' + (err.message || err), 'error');
      }).getInvoiceInitialData();
    };

    // Konversi dd/MM/yyyy → yyyy-MM-dd untuk input date
    function _toISO(str) {
      if (!str) return '';
      const p = str.toString().split('/');
      return p.length === 3 ? `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` : '';
    }

    function _currentInvoiceWO() {
      const id = document.getElementById('inv-wo').value;
      return _invoiceWOList.find(w => w.noWO === id) || null;
    }

    function onInvoiceWOChange() {
      const wo = _currentInvoiceWO();
      const info = document.getElementById('inv-wo-info');
      if (!wo) {
        info.classList.add('hidden');
        document.getElementById('inv-po-penawaran').innerText = '-';
        _renderScopeInvoice(null); hitungInvoice(); return;
      }
      info.classList.remove('hidden');
      document.getElementById('inv-info-klien').innerText   = wo.namaKlien;
      document.getElementById('inv-info-project').innerText = wo.namaProject;
      document.getElementById('inv-info-grand').innerText   = 'Rp ' + Math.round(wo.nilaiKontrak).toLocaleString('id-ID');
      document.getElementById('inv-info-ppn').innerText     = wo.ppnRate > 0 ? (wo.ppnRate + '%') : 'Tidak ada';
      document.getElementById('inv-info-ditagih').innerText = 'Rp ' + Math.round(wo.ditagihDpp - (_invoiceEditId ? _invoiceEditDpp : 0)).toLocaleString('id-ID');
      document.getElementById('inv-info-sisa').innerText    = 'Rp ' + Math.round(_invEffSisa(wo)).toLocaleString('id-ID');
      document.getElementById('inv-po-penawaran').innerText = wo.id || '-';

      _renderScopeInvoice(wo);
      onInvoicePersenInput(); // sinkronkan nominal dari persen default
    }

    function onInvoiceJenisChange() {
      const jenis = document.getElementById('inv-jenis').value;
      // Pengaturan nominal hanya relevan untuk DP/Termin
      const showNominal = (jenis === 'DP' || jenis === 'Termin');
      document.getElementById('inv-nominal-wrap').style.display = showNominal ? '' : 'none';
      hitungInvoice();
    }

    // Edit persen → nominal menyesuaikan
    function onInvoicePersenInput() {
      const wo = _currentInvoiceWO();
      const persen = parseFloat(document.getElementById('inv-persen').value) || 0;
      const nominal = wo ? Math.round(persen / 100 * wo.nilaiKontrak) : 0;
      document.getElementById('inv-nominal').value = formatNominalRupiah(nominal);
      hitungInvoice();
    }

    // Edit nominal → persen menyesuaikan
    function onInvoiceNominalInput() {
      const wo = _currentInvoiceWO();
      const el = document.getElementById('inv-nominal');
      const nominal = pN(el.value);
      el.value = formatNominalRupiah(nominal);
      const persen = (wo && wo.nilaiKontrak > 0) ? Number(((nominal / wo.nilaiKontrak) * 100).toFixed(2)) : 0;
      document.getElementById('inv-persen').value = persen;
      hitungInvoice();
    }

    function onInvoicePOToggle() {
      const ada = document.getElementById('inv-ada-po').checked;
      document.getElementById('inv-po-fields').style.display = ada ? '' : 'none';
      document.getElementById('inv-po-hint').style.display   = ada ? 'none' : '';
    }

    // Render scope read-only dari item penawaran (deskripsi, qty, unit — tanpa harga)
    function _renderScopeInvoice(wo) {
      const cont = document.getElementById('inv-scope');
      if (!wo) { cont.innerHTML = '<p class="text-slate-400 italic">Pilih Work Order untuk menampilkan scope.</p>'; return; }
      let kelompokList = [];
      try { kelompokList = JSON.parse(wo.items || '[]'); } catch (e) {}
      if (!kelompokList.length) { cont.innerHTML = '<p class="text-slate-400 italic">Tidak ada rincian item pada penawaran.</p>'; return; }

      let html = '';
      kelompokList.forEach(k => {
        const namaK = (k.namaKelompok || k.nama || '').toString();
        if (namaK) html += `<p class="font-bold text-blue-700 mt-1.5 first:mt-0">${namaK.toUpperCase()}</p>`;
        (k.subItems || k.items || []).forEach(s => {
          html += `<div class="flex justify-between gap-2 pl-2">
            <span class="text-slate-600">• ${s.deskripsi || ''}</span>
            <span class="text-slate-400 whitespace-nowrap">${s.qty || ''} ${s.unit || ''}</span>
          </div>`;
        });
      });
      cont.innerHTML = html;
    }

    // Sisa kontrak efektif (saat edit, tambahkan kembali dpp invoice ini)
    function _invEffSisa(wo) {
      return (wo ? wo.sisaDpp : 0) + (_invoiceEditId ? _invoiceEditDpp : 0);
    }

    // Hitung DPP berdasarkan jenis, lalu PPN otomatis dari penawaran
    function _computeInvoice() {
      const wo = _currentInvoiceWO();
      if (!wo) return { dpp: 0, ppnPersen: 0, ppnNominal: 0, total: 0 };
      const jenis = document.getElementById('inv-jenis').value;

      let dpp = 0;
      if (jenis === 'Pelunasan')  dpp = _invEffSisa(wo);
      else if (jenis === 'Penuh') dpp = wo.nilaiKontrak;
      else                        dpp = pN(document.getElementById('inv-nominal').value); // DP/Termin
      const ppnPersen  = wo.ppnRate || 0;
      const ppnNominal = Math.round(dpp * ppnPersen / 100);
      return { dpp: dpp, ppnPersen: ppnPersen, ppnNominal: ppnNominal, total: dpp + ppnNominal };
    }

    function hitungInvoice() {
      const c = _computeInvoice();
      document.getElementById('inv-dpp').innerText         = Math.round(c.dpp).toLocaleString('id-ID');
      document.getElementById('inv-ppn-label').innerText   = c.ppnPersen > 0 ? ('(' + c.ppnPersen + '%)') : '';
      document.getElementById('inv-ppn-nominal').innerText = Math.round(c.ppnNominal).toLocaleString('id-ID');
      document.getElementById('inv-total').innerText       = Math.round(c.total).toLocaleString('id-ID');
    }

    function submitInvoice() {
      const wo = _currentInvoiceWO();
      if (!wo) return showNotification('Silakan pilih Work Order!', 'error');

      const jenis = document.getElementById('inv-jenis').value;
      const c = _computeInvoice();
      const effSisa = _invEffSisa(wo);
      if (c.dpp <= 0) return showNotification('Nilai tagihan harus lebih dari 0!', 'error');
      if (c.dpp > effSisa + 1) return showNotification('Nilai tagihan melebihi sisa kontrak (Rp ' + Math.round(effSisa).toLocaleString('id-ID') + ').', 'error');

      // PO: jika ada → pakai input; jika tidak → pakai No. Penawaran sebagai referensi
      const adaPO = document.getElementById('inv-ada-po').checked;
      const noPO  = adaPO ? document.getElementById('inv-nopo').value.trim() : (wo.id || '');
      const tglPO = adaPO ? _toDDMMYYYY(document.getElementById('inv-tglpo').value) : (wo.tanggal || '');
      if (adaPO && !noPO) return showNotification('No. PO belum diisi.', 'error');

      const payload = {
        noWO:        wo.noWO,
        tanggal:     _toDDMMYYYY(document.getElementById('inv-tanggal').value),
        jenis:       jenis,
        inputMode:   'nominal',
        persen:      (jenis === 'DP' || jenis === 'Termin') ? (parseFloat(document.getElementById('inv-persen').value) || 0) : 0,
        dpp:         c.dpp,
        noPO:        noPO,
        tglPO:       tglPO,
        catatan:     document.getElementById('inv-catatan').value.trim(),
        bankAccount: document.getElementById('inv-bank').value.trim(),
        dibuatOleh:  (window._getCurrentUserNama ? window._getCurrentUserNama() : 'Sales Executive')
      };

      const editing = !!_invoiceEditId;
      if (editing) payload.id = _invoiceEditId;

      toggleLoader(true, editing ? 'Memperbarui invoice...' : 'Menyimpan invoice...');
      const handler = function(res) {
        toggleLoader(false);
        if (res.success) {
          showNotification(res.message);
          document.getElementById('modal-invoice').classList.add('hidden');
          loadInvoice();
        } else showNotification(res.message, 'error');
      };
      const failure = function(err) {
        toggleLoader(false);
        showNotification('Gagal: ' + (err.message || err), 'error');
      };

      if (editing) {
        google.script.run.withSuccessHandler(handler).withFailureHandler(failure).editInvoice(payload);
      } else {
        google.script.run.withSuccessHandler(handler).withFailureHandler(failure).simpanInvoice(payload);
      }
    }

    function ubahStatusBayarInvoice(id, sel) {
      const statusBaru = sel.value;
      sel.disabled = true;
      toggleLoader(true, statusBaru === 'Lunas' ? 'Melunasi & membuat kwitansi...' : 'Memperbarui status...');
      google.script.run.withSuccessHandler(function(res) {
        toggleLoader(false);
        sel.disabled = false;
        showNotification(res.message, res.success ? 'success' : 'error');
        loadInvoice();
      }).withFailureHandler(function(err) {
        toggleLoader(false);
        sel.disabled = false;
        showNotification(err.message || err, 'error');
        loadInvoice();
      }).updateStatusBayarInvoice(id, statusBaru);
    }

    // ── Export kwitansi PDF langsung dari halaman invoice ──
    function exportKwitansiPDFDariInvoice(kwitansiId, item) {
      document.getElementById('preview-pdf-title').innerText = 'Kwitansi — ' + kwitansiId;
      document.getElementById('preview-pdf-subtitle').innerText = (item.namaKlien || '') + ' · ' + (item.namaProject || '');
      document.getElementById('preview-pdf-loading').classList.remove('hidden');
      document.getElementById('preview-pdf-canvas-wrap').classList.add('hidden');
      document.getElementById('preview-pdf-canvas-wrap').innerHTML = '';
      document.getElementById('modal-preview-pdf').classList.remove('hidden');

      google.script.run.withSuccessHandler(function(res) {
        if (res.success) {
          _activePdfBase64 = res.pdfBase64;
          _activePdfName   = res.fileName;
          renderPDFDariBase64(res.pdfBase64);
        } else {
          document.getElementById('preview-pdf-loading').innerHTML = `
            <i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>
            <p class="text-sm text-rose-400 text-center px-4">${res.message}</p>
            <button onclick="tutupPreviewPDF()" class="mt-4 px-4 py-2 bg-slate-200 rounded-xl text-sm font-bold text-slate-600">Tutup</button>`;
        }
      }).withFailureHandler(function(err) {
        document.getElementById('preview-pdf-loading').innerHTML = `
          <i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>
          <p class="text-sm text-rose-400 text-center px-4">Error: ${err.message || err}</p>`;
      }).exportKwitansiDariTemplate(kwitansiId);
    }

    // ── Export PDF Invoice (reuse modal preview PDF) ──
    function exportInvoicePDF(item) {
      document.getElementById('preview-pdf-title').innerText = 'Invoice — ' + item.id;
      document.getElementById('preview-pdf-subtitle').innerText = (item.namaProject || '') + ' · ' + (item.namaKlien || '');
      document.getElementById('preview-pdf-loading').classList.remove('hidden');
      document.getElementById('preview-pdf-canvas-wrap').classList.add('hidden');
      document.getElementById('preview-pdf-canvas-wrap').innerHTML = '';
      document.getElementById('modal-preview-pdf').classList.remove('hidden');

      google.script.run.withSuccessHandler(function(res) {
        if (res.success) {
          _activePdfBase64 = res.pdfBase64;
          _activePdfName   = res.fileName;
          renderPDFDariBase64(res.pdfBase64);
        } else {
          document.getElementById('preview-pdf-loading').innerHTML = `
            <i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>
            <p class="text-sm text-rose-400 text-center px-4">${res.message}</p>
            <button onclick="tutupPreviewPDF()" class="mt-4 px-4 py-2 bg-slate-200 rounded-xl text-sm font-bold text-slate-600">Tutup</button>`;
        }
      }).withFailureHandler(function(err) {
        document.getElementById('preview-pdf-loading').innerHTML = `
          <i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>
