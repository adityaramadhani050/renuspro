      <section id="page-workorder" class="page-section">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
          <div>
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Work Order</h2>
            <p class="text-sm text-slate-400 font-medium mt-0.5">
              Seluruh penawaran berstatus <span class="font-bold text-emerald-600">Deal</span> beserta nomor WO-nya.
            </p>
          </div>
          <div class="relative flex-1 sm:flex-none sm:w-64 w-full">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
            <input type="text" id="search-workorder" oninput="filterWorkOrder()"
              placeholder="Cari No WO, penawaran, klien..."
              class="w-full pl-8 pr-3 py-2.5 text-sm border border-slate-200 rounded-xl
                    focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 bg-white">
          </div>
        </div>

        <!-- Tabel Work Order -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-150 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-wider">
                  <th class="p-4">No WO</th>
                  <th class="p-4">No Penawaran</th>
                  <th class="p-4">Klien / Project</th>
                  <th class="p-4">Sales</th>
                  <th class="p-4 text-right">Grand Total</th>
                  <th class="p-4 text-center">Aksi</th>
                </tr>
              </thead>
              <tbody id="table-workorder" class="text-sm">
                <tr><td colspan="6" class="p-8 text-center text-slate-500">
                  <i class="fas fa-spinner fa-spin mr-2"></i> Memuat data work order...
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Modal Catatan Customer -->
        <div id="modal-catatan-wo" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4">
          <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-slate-50">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-comment-dots text-amber-500"></i>
                <h3 class="text-lg font-extrabold text-slate-800">Catatan Customer</h3>
              </div>
              <button onclick="tutupModalCatatanWO()" class="w-8 h-8 rounded-lg hover:bg-slate-200 text-slate-400 hover:text-slate-600 flex items-center justify-center transition">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div class="p-6">
              <div class="mb-3 text-sm">
                <span class="font-bold text-emerald-700" id="catatan-wo-nomor"></span>
                <span class="text-slate-400" id="catatan-wo-project"></span>
              </div>
              <p class="text-xs text-slate-500 mb-2">
                Catatan / request / komunikasi dari customer untuk tim project. Akan ikut tercetak di PDF Work Order.
              </p>
              <textarea id="catatan-wo-text" rows="6"
                placeholder="Contoh: Customer meminta panel dipasang menghadap timur. Pengiriman maksimal sebelum tanggal 20. Mohon koordinasi dengan Pak Budi (08xxxx) sebelum instalasi."
                class="w-full p-3 text-sm border border-slate-200 rounded-xl focus:outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-100 resize-none"></textarea>
              <input type="hidden" id="catatan-wo-id">
            </div>
            <div class="flex justify-end gap-2 px-6 py-4 border-t border-slate-100 bg-slate-50">
              <button onclick="tutupModalCatatanWO()"
                class="px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-200 rounded-xl transition">
                Batal
              </button>
              <button onclick="kirimCatatanWO()"
                class="px-5 py-2 text-sm font-bold text-white bg-amber-500 hover:bg-amber-600 rounded-xl shadow-sm transition flex items-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> Simpan Catatan
              </button>
            </div>
          </div>
        </div>
      </section>
