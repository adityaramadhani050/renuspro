<script>
// ================================================================
//  LAPORAN FINANCE — JavaScript
// ================================================================

var _frData   = null;
var _frFilter = { mode: 'thisMonth', from: null, to: null };

// ── Filter preset ────────────────────────────────────────────────
window.setFRPreset = function(mode) {
  _frFilter.mode = mode;
  document.querySelectorAll('.fr-preset-btn').forEach(function(b) {
    b.classList.remove('active', 'bg-blue-600', 'text-white', 'border-blue-600');
    b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
  });
  var active = document.getElementById('fr-preset-' + mode);
  if (active) {
    active.classList.add('active', 'bg-blue-600', 'text-white', 'border-blue-600');
    active.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
  }
  var customRange = document.getElementById('fr-custom-range');
  if (mode === 'custom') {
    customRange.classList.remove('hidden');
    customRange.style.display = 'flex';
    return;
  }
  customRange.classList.add('hidden');

  var now = new Date(), y = now.getFullYear(), m = now.getMonth();
  if (mode === 'thisMonth') {
    _frFilter.from = new Date(y, m, 1);
    _frFilter.to   = new Date(y, m + 1, 0);
  } else if (mode === 'lastMonth') {
    var lm = m === 0 ? 11 : m - 1, ly = m === 0 ? y - 1 : y;
    _frFilter.from = new Date(ly, lm, 1);
    _frFilter.to   = new Date(ly, lm + 1, 0);
  } else if (mode === 'thisYear') {
    _frFilter.from = new Date(y, 0, 1);
    _frFilter.to   = new Date(y, 11, 31);
  } else { // all
    _frFilter.from = null;
    _frFilter.to   = null;
  }
  _frUpdatePeriodLabel();
  loadFinanceReport();
};

window.applyFRCustomFilter = function() {
  var fromVal = document.getElementById('fr-date-from').value;
  var toVal   = document.getElementById('fr-date-to').value;
  if (!fromVal || !toVal) { showNotification('Pilih tanggal mulai dan akhir.', 'error'); return; }
  _frFilter.from = new Date(fromVal);
  _frFilter.to   = new Date(toVal);
  _frFilter.to.setHours(23, 59, 59);
  _frUpdatePeriodLabel();
  loadFinanceReport();
};

function _frUpdatePeriodLabel() {
  var el = document.getElementById('fr-period-label');
  if (!el) return;
  var f = _frFilter;
  if (!f.from && !f.to) { el.textContent = 'Semua Periode'; return; }
  var opts = { day: '2-digit', month: 'short', year: 'numeric' };
  var from = f.from ? f.from.toLocaleDateString('id-ID', opts) : '';
  var to   = f.to   ? f.to.toLocaleDateString('id-ID', opts)   : '';
  el.textContent = from + (to && to !== from ? ' – ' + to : '');
}

function _frBuildFilterParam() {
  if (!_frFilter.from && !_frFilter.to) return null;
  var fmt = function(d) {
    return d.getFullYear() + '-'
      + ('0' + (d.getMonth() + 1)).slice(-2) + '-'
      + ('0' + d.getDate()).slice(-2);
  };
  return {
    from: _frFilter.from ? fmt(_frFilter.from) : null,
    to:   _frFilter.to   ? fmt(_frFilter.to)   : null
  };
}

// ── Load ─────────────────────────────────────────────────────────
window.loadFinanceReport = function() {
  _frAgingFilter = null;
  ['current','gte30','gte60','gte90'].forEach(function(k) {
    var c = document.getElementById('fr-aging-card-' + k);
    if (c) c.classList.remove('border-emerald-400','border-amber-400','border-orange-400','border-rose-400');
  });
  var bar = document.getElementById('fr-aging-filter-bar');
  if (bar) { bar.classList.add('hidden'); bar.style.display = ''; }
  document.getElementById('fr-loading').classList.remove('hidden');
  document.getElementById('fr-content').classList.add('hidden');
  var param = _frBuildFilterParam();
  google.script.run
    .withSuccessHandler(_frRender)
    .withFailureHandler(function(e) {
      document.getElementById('fr-loading').classList.add('hidden');
      showNotification('Gagal memuat data laporan: ' + e.message, 'error');
    })
    .getFinanceReportData(param);
};

function _frFmt(n) {
  if (!n) return 'Rp 0';
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

function _frRender(data) {
  document.getElementById('fr-loading').classList.add('hidden');
  if (!data || !data.success) {
    showNotification('Gagal memuat laporan keuangan.', 'error');
    return;
  }
  _frData = data;
  _frUpdatePeriodLabel();

  var s = data.summary;
  var pct = s.totalTagihan > 0 ? Math.round(s.totalTerbayar / s.totalTagihan * 100) : 0;

  // KPI
  document.getElementById('fr-kpi-tagihan').textContent     = _frFmt(s.totalTagihan);
  document.getElementById('fr-kpi-terbayar').textContent    = _frFmt(s.totalTerbayar);
  document.getElementById('fr-kpi-outstanding').textContent = _frFmt(s.totalOutstanding);
  document.getElementById('fr-kpi-pct').textContent         = pct + '%';
  document.getElementById('fr-collect-bar').style.width     = Math.min(pct, 100) + '%';

  // Aging
  var ag = s.aging || {};
  document.getElementById('fr-aging-0').textContent  = _frFmt(ag.current || 0);
  document.getElementById('fr-aging-30').textContent = _frFmt(ag.gte30 || 0);
  document.getElementById('fr-aging-60').textContent = _frFmt(ag.gte60 || 0);
  document.getElementById('fr-aging-90').textContent = _frFmt(ag.gte90 || 0);

  // Table
  _frRenderTable(data.rows || []);

  document.getElementById('fr-content').classList.remove('hidden');
}

// ── Aging filter ─────────────────────────────────────────────────
var _frAgingFilter = null; // null | 'current' | 'gte30' | 'gte60' | 'gte90'

var _frAgingMeta = {
  current: { label: '< 30 Hari',  labelClass: 'bg-emerald-100 text-emerald-700', borderClass: 'border-emerald-400' },
  gte30:   { label: '30–59 Hari', labelClass: 'bg-amber-100 text-amber-700',     borderClass: 'border-amber-400'   },
  gte60:   { label: '60–89 Hari', labelClass: 'bg-orange-100 text-orange-700',   borderClass: 'border-orange-400'  },
  gte90:   { label: '≥ 90 Hari',  labelClass: 'bg-rose-100 text-rose-700',       borderClass: 'border-rose-400'    }
};

window.frFilterAging = function(bucket) {
  _frAgingFilter = bucket;

  // Update card styles
  ['current','gte30','gte60','gte90'].forEach(function(k) {
    var card = document.getElementById('fr-aging-card-' + k);
    if (!card) return;
    card.classList.remove('border-emerald-400','border-amber-400','border-orange-400','border-rose-400','ring-2');
    if (k === bucket) {
      card.classList.add(_frAgingMeta[k].borderClass);
    }
  });

  // Update filter bar
  var bar   = document.getElementById('fr-aging-filter-bar');
  var lbl   = document.getElementById('fr-aging-filter-label');
  if (!bucket) {
    bar.classList.add('hidden'); bar.style.display = '';
    lbl.textContent = ''; lbl.className = 'text-xs font-semibold px-2.5 py-1 rounded-full';
  } else {
    bar.classList.remove('hidden'); bar.style.display = 'flex';
    var meta = _frAgingMeta[bucket];
    lbl.textContent = 'Filter: ' + meta.label;
    lbl.className = 'text-xs font-semibold px-2.5 py-1 rounded-full ' + meta.labelClass;
  }

  if (_frData) _frRenderTable(_frData.rows || []);
};

function _frGetInvAgingBucket(tglStr) {
  if (!tglStr) return null;
  var parts = tglStr.split('/');
  if (parts.length !== 3) return null;
  var d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
  if (isNaN(d.getTime())) return null;
  var days = Math.floor((new Date() - d) / 86400000);
  if (days >= 90) return 'gte90';
  if (days >= 60) return 'gte60';
  if (days >= 30) return 'gte30';
  return 'current';
}

function _frRenderTable(rows) {
  var tbody = document.getElementById('fr-table-body');

  // Terapkan filter aging jika aktif
  var displayRows = rows;
  if (_frAgingFilter) {
    displayRows = rows.filter(function(row) {
      return row.invoices.some(function(inv) {
        return inv.status !== 'Lunas' && _frGetInvAgingBucket(inv.tgl) === _frAgingFilter;
      });
    });
  }

  if (!displayRows.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-slate-400">'
      + (_frAgingFilter ? 'Tidak ada invoice di bucket aging ini.' : 'Tidak ada data Work Order Deal.')
      + '</td></tr>';
    return;
  }

  var html = '';
  displayRows.forEach(function(row, idx) {
    var lunasSemua = row.tagihan > 0 && row.outstanding <= 0;
    var belumAda   = row.invoices.length === 0;
    var statusHtml = belumAda
      ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-slate-100 text-slate-500">Belum Ada Invoice</span>'
      : lunasSemua
        ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-700"><i class="fa-solid fa-circle-check text-[9px]"></i> Lunas</span>'
        : '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-amber-100 text-amber-700"><i class="fa-solid fa-clock text-[9px]"></i> Outstanding</span>';

    var invCount = row.invoices.length;
    var isPredeal = row.isPredeal ? ' <span class="text-[9px] font-bold bg-amber-100 text-amber-600 px-1.5 py-0.5 rounded-full ml-1">Pre-Deal</span>' : '';

    html += '<tr class="hover:bg-slate-50 transition">';
    if (row.noWO) {
      html += '<td class="px-4 py-3 text-xs whitespace-nowrap">'
            + '<p class="font-bold text-slate-700">WO-' + row.noWO + '</p>'
            + '<p class="text-[11px] text-slate-400">' + row.noPenawaran + '</p>'
            + isPredeal + '</td>';
    } else {
      html += '<td class="px-4 py-3 text-xs whitespace-nowrap">'
            + '<p class="font-bold text-slate-700">' + row.noPenawaran + '</p>'
            + isPredeal + '</td>';
    }
    html += '<td class="px-4 py-3"><p class="font-semibold text-slate-800 text-xs leading-tight">' + (row.namaKlien || '—') + '</p>'
          + '<p class="text-[11px] text-slate-400 truncate max-w-[200px]">' + (row.namaProject || '—') + '</p></td>';
    html += '<td class="px-4 py-3 text-right text-xs font-medium text-slate-600 whitespace-nowrap">' + (row.nilaiKontrak ? _frFmt(row.nilaiKontrak) : '—') + '</td>';
    html += '<td class="px-4 py-3 text-right text-xs font-bold text-slate-700 whitespace-nowrap">' + (row.tagihan ? _frFmt(row.tagihan) : '—') + '</td>';
    html += '<td class="px-4 py-3 text-right text-xs font-bold text-emerald-600 whitespace-nowrap">' + (row.terbayar ? _frFmt(row.terbayar) : '—') + '</td>';
    html += '<td class="px-4 py-3 text-right text-xs font-bold whitespace-nowrap ' + (row.outstanding > 0 ? 'text-rose-600' : 'text-slate-400') + '">'
          + (row.outstanding > 0 ? _frFmt(row.outstanding) : '—') + '</td>';
    html += '<td class="px-4 py-3 text-center">' + statusHtml + '</td>';
    html += '<td class="px-4 py-3 text-center">';
    if (invCount > 0) {
      html += '<button onclick="_frToggleInv(' + idx + ')" id="fr-inv-btn-' + idx + '"'
            + ' class="text-[11px] font-bold text-blue-600 hover:text-blue-800 flex items-center gap-1 mx-auto">'
            + '<i id="fr-inv-chevron-' + idx + '" class="fa-solid fa-chevron-down text-[9px] transition-transform duration-200"></i>'
            + ' ' + invCount + ' invoice</button>';
    } else {
      html += '<span class="text-[11px] text-slate-300">—</span>';
    }
    html += '</td></tr>';

    // Sub-rows: detail invoice (hidden by default)
    if (invCount > 0) {
      html += '<tr id="fr-inv-detail-' + idx + '" class="hidden">';
      html += '<td colspan="8" class="px-4 pb-3 pt-0 bg-slate-50/70">';
      html += '<div class="rounded-xl border border-slate-200 overflow-hidden mt-1">';
      html += '<table class="w-full text-left text-[11px]">';
      html += '<thead class="bg-slate-100 border-b border-slate-200"><tr>'
            + '<th class="px-3 py-2 font-bold text-slate-500">No Invoice</th>'
            + '<th class="px-3 py-2 font-bold text-slate-500">Tgl Invoice</th>'
            + '<th class="px-3 py-2 font-bold text-slate-500">Jenis</th>'
            + '<th class="px-3 py-2 font-bold text-slate-500 text-right">DPP</th>'
            + '<th class="px-3 py-2 font-bold text-slate-500 text-right">PPN</th>'
            + '<th class="px-3 py-2 font-bold text-slate-500 text-right">Total</th>'
            + '<th class="px-3 py-2 font-bold text-slate-500 text-center">Status</th>'
            + '<th class="px-3 py-2 font-bold text-slate-500 text-center">Tgl Bayar</th>'
            + '</tr></thead><tbody class="divide-y divide-slate-100">';

      row.invoices.forEach(function(inv) {
        var stBadge = inv.status === 'Lunas'
          ? '<span class="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 font-bold">Lunas</span>'
          : '<span class="px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-bold">Belum Lunas</span>';
        html += '<tr class="hover:bg-white transition">'
              + '<td class="px-3 py-2 font-bold text-slate-700">' + inv.noInv + '</td>'
              + '<td class="px-3 py-2 text-slate-500">' + (inv.tgl || '—') + '</td>'
              + '<td class="px-3 py-2 text-slate-600">' + (inv.jenis || '—') + '</td>'
              + '<td class="px-3 py-2 text-right text-slate-700">' + _frFmt(inv.dpp) + '</td>'
              + '<td class="px-3 py-2 text-right text-slate-500">' + (inv.ppnPct ? inv.ppnPct + '%' : '—') + '</td>'
              + '<td class="px-3 py-2 text-right font-bold text-slate-800">' + _frFmt(inv.total) + '</td>'
              + '<td class="px-3 py-2 text-center">' + stBadge + '</td>'
              + '<td class="px-3 py-2 text-center text-slate-500">' + (inv.tglBayar || '—') + '</td>'
              + '</tr>';
      });

      html += '</tbody></table></div></td></tr>';
    }
  });

  tbody.innerHTML = html;
}

function _frToggleInv(idx) {
  var detail = document.getElementById('fr-inv-detail-' + idx);
  var chevron = document.getElementById('fr-inv-chevron-' + idx);
  if (!detail) return;
  var hidden = detail.classList.toggle('hidden');
  if (chevron) chevron.style.transform = hidden ? '' : 'rotate(180deg)';
}

// ── Export PDF ───────────────────────────────────────────────────────────────
window.exportFinanceReportPDF = function() {
  if (!_frData) { showNotification('Muat data terlebih dahulu.', 'error'); return; }
  try {
  var data    = _frData;
  var s       = data.summary || {};
  var allRows = data.rows || [];

  var doc  = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  var PW   = 210, ML = 14, MR = 14, CW = PW - ML - MR;
  var DARK  = [30,41,59],  SLATE = [100,116,139], BLUE  = [30,64,175];
  var GREEN = [5,150,105], RED   = [190,30,45],   WHITE = [255,255,255];
  var rp = function(v) { return 'Rp ' + Math.round(v||0).toLocaleString('id-ID'); };

  var periodLabel = document.getElementById('fr-period-label');
  var periodText  = periodLabel ? periodLabel.textContent : '';
  var tglCetak    = new Date().toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });

  // ── Dark header ──────────────────────────────────────────────
  doc.setFillColor(...DARK); doc.rect(0, 0, PW, 24, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(...WHITE);
  doc.text('LAPORAN PROGRESS PEMBAYARAN', ML, 11);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(190,200,220);
  doc.text('PT. RENUS GLOBAL INDONESIA', ML, 17);
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(170,195,255);
  doc.text('Periode:', PW - MR, 10, { align:'right' });
  doc.setFont('helvetica','normal'); doc.setTextColor(...WHITE);
  doc.text(periodText || '-', PW - MR, 15, { align:'right' });
  doc.setFontSize(7); doc.setTextColor(190,200,220);
  doc.text('Dicetak: ' + tglCetak, PW - MR, 20, { align:'right' });

  var y = 30;

  // ── KPI boxes ────────────────────────────────────────────────
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...BLUE);
  doc.text('RINGKASAN PEMBAYARAN', ML, y); y += 5;
  var kpiItems = [
    { label:'Total Tagihan',  value: rp(s.totalTagihan),     color: DARK  },
    { label:'Terbayar',       value: rp(s.totalTerbayar),    color: GREEN },
    { label:'Outstanding',    value: rp(s.totalOutstanding), color: RED   }
  ];
  var boxW = (CW - 5) / 3, boxH = 14, gap = 2.5;
  kpiItems.forEach(function(k, i) {
    var bx = ML + i * (boxW + gap), by = y;
    doc.setFillColor(248,250,252); doc.setDrawColor(226,232,240);
    doc.roundedRect(bx, by, boxW, boxH, 2, 2, 'FD');
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...SLATE);
    doc.text(k.label.toUpperCase(), bx + 3, by + 4.5);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...k.color);
    doc.text(k.value, bx + 3, by + 10.5);
  });
  y += boxH + 8;

  // ── Aging summary ─────────────────────────────────────────────
  var ag = s.aging || {};
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...BLUE);
  doc.text('AGING OUTSTANDING (INVOICE BELUM LUNAS)', ML, y); y += 3;
  doc.autoTable({
    startY: y,
    head: [['Bucket', 'Nilai Outstanding']],
    body: [
      ['< 30 Hari',  rp(ag.current || 0)],
      ['30-59 Hari', rp(ag.gte30   || 0)],
      ['60-89 Hari', rp(ag.gte60   || 0)],
      ['> 90 Hari',  rp(ag.gte90   || 0)]
    ],
    theme: 'grid',
    styles: { fontSize: 8, cellPadding: 2.5, font:'helvetica' },
    headStyles: { fillColor: BLUE, textColor: WHITE, fontStyle:'bold' },
    columnStyles: { 1: { halign: 'right' } },
    margin: { left: ML, right: MR },
    tableWidth: 90
  });
  y = doc.lastAutoTable.finalY + 8;

  // ── 4 Tabel per aging bucket ──────────────────────────────────
  var agingBuckets = [
    { key:'current', label:'< 30 HARI',  headFill:[6,78,59]   },
    { key:'gte30',   label:'30-59 HARI', headFill:[120,53,15] },
    { key:'gte60',   label:'60-89 HARI', headFill:[124,45,18] },
    { key:'gte90',   label:'> 90 HARI',  headFill:[159,18,57] }
  ];
  var woHead = [['No WO / Penawaran','Klien / Project','Nilai Kontrak','Ditagih','Terbayar','Outstanding','Aging (Hari)']];

  agingBuckets.forEach(function(bucket) {
    var bucketRows = allRows.filter(function(row) {
      return row.invoices.some(function(inv) {
        return inv.status !== 'Lunas' && _frGetInvAgingBucket(inv.tgl) === bucket.key;
      });
    });

    if (y > 240) { doc.addPage(); y = 14; }

    doc.setFillColor(...bucket.headFill);
    doc.roundedRect(ML, y, CW, 8, 1.5, 1.5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...WHITE);
    doc.text('OUTSTANDING AGING ' + bucket.label + '  (' + bucketRows.length + ' WO)', ML + 3, y + 5.5);
    y += 10;

    if (!bucketRows.length) {
      doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.setTextColor(...SLATE);
      doc.text('Tidak ada invoice outstanding di bucket ini.', ML + 3, y + 4);
      y += 10; return;
    }

    var woBody = bucketRows.map(function(row) {
      var outstandingBucket = 0;
      var maxDays = 0;
      row.invoices.forEach(function(inv) {
        if (inv.status !== 'Lunas' && _frGetInvAgingBucket(inv.tgl) === bucket.key) {
          outstandingBucket += inv.total || 0;
          var p = (inv.tgl || '').split('/');
          if (p.length === 3) {
            var d = new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
            var days = isNaN(d.getTime()) ? 0 : Math.floor((new Date() - d) / 86400000);
            if (days > maxDays) maxDays = days;
          }
        }
      });
      return [
        (row.noWO ? 'WO-' + row.noWO + '\n' : '') + row.noPenawaran,
        (row.namaKlien || '-') + '\n' + (row.namaProject || ''),
        row.nilaiKontrak ? rp(row.nilaiKontrak) : '-',
        row.tagihan      ? rp(row.tagihan)      : '-',
        row.terbayar     ? rp(row.terbayar)     : '-',
        outstandingBucket > 0 ? rp(outstandingBucket) : '-',
        maxDays > 0 ? maxDays + ' hari' : '-'
      ];
    });

    doc.autoTable({
      startY: y, margin: { left: ML, right: MR },
      head: woHead, body: woBody, theme: 'grid',
      styles: { fontSize: 7, cellPadding: 2, font:'helvetica', textColor: DARK },
      headStyles: { fillColor: [51,65,85], textColor: WHITE, fontStyle:'bold', fontSize: 7 },
      columnStyles: {
        0: { cellWidth: 30 }, 1: { cellWidth: 44 },
        2: { halign:'right', cellWidth: 24 }, 3: { halign:'right', cellWidth: 22 },
        4: { halign:'right', cellWidth: 22 }, 5: { halign:'right', fontStyle:'bold', cellWidth: 24 },
        6: { halign:'center', cellWidth: 16 }
      },
      alternateRowStyles: { fillColor: [248,250,252] },
      didParseCell: function(d) {
        if (d.section === 'body' && d.column.index === 5) d.cell.styles.textColor = RED;
      }
    });
    y = doc.lastAutoTable.finalY + 8;
  });

  // ── Page numbers ──────────────────────────────────────────────
  var totalPages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= totalPages; p++) {
    doc.setPage(p);
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...SLATE);
    doc.text('Halaman ' + p + ' / ' + totalPages, PW / 2, 292, { align:'center' });
    doc.text('PT. RENUS GLOBAL INDONESIA — KONFIDENSIAL', ML, 292);
  }

  doc.save('Laporan_Pembayaran_RGI.pdf');
  showNotification('PDF berhasil diunduh!');
  } catch(e) { showNotification('Gagal export PDF: ' + e.message, 'error'); }
};
</script>
