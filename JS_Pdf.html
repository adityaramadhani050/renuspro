<script>
    // ============================================================
    // SISTEM EXPORT & PREVIEW QUOTATION PDF
    // ============================================================

    let _activePdfDoc  = null;
    let _activePdfName = '';

    // Variabel global untuk menyimpan PDF aktif (base64 version)
    let _activePdfBase64 = null;

    function tutupPreviewPDF() {
      document.getElementById('modal-preview-pdf').classList.add('hidden');

      const wrap    = document.getElementById('preview-pdf-canvas-wrap');
      const loading = document.getElementById('preview-pdf-loading');

      // Reset canvas wrap
      wrap.innerHTML      = '';
      wrap.style.display  = '';
      wrap.style.visibility = '';
      wrap.classList.add('hidden');

      // Reset loading ke state awal dan pastikan terlihat kembali
      loading.classList.remove('hidden');
      loading.innerHTML = `
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-slate-300 border-t-blue-500"></div>
        <p class="text-sm font-medium">Membuat preview...</p>`;

      _activePdfDoc  = null;
      _activePdfBase64 = null
      _activePdfName = '';
    }

function exportPenawaranPDF(item) {
  document.getElementById('preview-pdf-title').innerText =
    'Preview — ' + item.id + ' Rev' + item.rev;
  document.getElementById('preview-pdf-subtitle').innerText =
    item.namaProject + ' · ' + item.namaKlien;
  document.getElementById('preview-pdf-loading').classList.remove('hidden');
  document.getElementById('preview-pdf-canvas-wrap').classList.add('hidden');
  document.getElementById('preview-pdf-canvas-wrap').innerHTML = '';
  document.getElementById('modal-preview-pdf').classList.remove('hidden');

  if (typeof google !== 'undefined') {
    google.script.run
      .withSuccessHandler(async function(res) {
        if (res.success) {
          try {
            let kelompokList = [];
            try { kelompokList = JSON.parse(item.items || '[]'); } catch(e) {}

            const mainBinary = atob(res.pdfBase64);
            const mainBytes  = new Uint8Array(mainBinary.length);
            for (let i = 0; i < mainBinary.length; i++) mainBytes[i] = mainBinary.charCodeAt(i);

            const mergedBytes = await _mergePdfDenganTC(mainBytes, kelompokList);

            let binaryStr = '';
            for (let i = 0; i < mergedBytes.length; i++) binaryStr += String.fromCharCode(mergedBytes[i]);
            _activePdfBase64 = btoa(binaryStr);
            _activePdfName   = res.fileName;

            renderPDFDariBase64(_activePdfBase64);
          } catch(mergeErr) {
            console.warn('Merge T&C gagal, tampilkan tanpa lampiran:', mergeErr);
            _activePdfBase64 = res.pdfBase64;
            _activePdfName   = res.fileName;
            renderPDFDariBase64(res.pdfBase64);
          }
        } else {
          document.getElementById('preview-pdf-loading').innerHTML = `
            <i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>
            <p class="text-sm text-rose-400 text-center px-4">${res.message}</p>
            <button onclick="tutupPreviewPDF()"
              class="mt-4 px-4 py-2 bg-slate-200 rounded-xl text-sm font-bold text-slate-600">Tutup</button>`;
        }
      })
      .withFailureHandler(function(err) {
        document.getElementById('preview-pdf-loading').innerHTML = `
          <i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>
          <p class="text-sm text-rose-400 text-center px-4">Error: ${err.message || err}</p>`;
      })
      .exportQuotationDariTemplate(item);
  } else {
    setTimeout(() => buatDokumenPDF(item), 80);
  }
}

// Render PDF dari base64 string ke canvas
async function renderPDFDariBase64(base64String) {
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Decode base64 → ArrayBuffer
    const binaryStr = atob(base64String);
    const bytes     = new Uint8Array(binaryStr.length);
    for (let i = 0; i < binaryStr.length; i++) {
      bytes[i] = binaryStr.charCodeAt(i);
    }

    const pdfDoc = await pdfjsLib.getDocument({ data: bytes.buffer }).promise;
    const wrap   = document.getElementById('preview-pdf-canvas-wrap');
    wrap.innerHTML    = '';
    wrap.style.display    = 'flex';
    wrap.style.flexDirection = 'column';
    wrap.style.visibility = 'hidden';

    const wrapW = Math.min(wrap.clientWidth || 340, 700);

    for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
      const page     = await pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: 1 });
      const scale    = (wrapW - 16) / viewport.width;
      const vp       = page.getViewport({ scale });

      if (pdfDoc.numPages > 1) {
        const label     = document.createElement('p');
        label.innerText = `Halaman ${pageNum} / ${pdfDoc.numPages}`;
        label.style.cssText =
          'font-size:11px;color:#94a3b8;font-weight:600;text-align:center;margin:0;';
        wrap.appendChild(label);
      }

      const canvas        = document.createElement('canvas');
      canvas.width        = vp.width;
      canvas.height       = vp.height;
      canvas.style.cssText =
        'width:100%;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,0.5);' +
        'background:#fff;display:block;';
      wrap.appendChild(canvas);

      await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport: vp
      }).promise;
    }

    wrap.style.visibility = 'visible';
    wrap.classList.remove('hidden');
    document.getElementById('preview-pdf-loading').classList.add('hidden');

  } catch(err) {
    document.getElementById('preview-pdf-loading').innerHTML = `
      <i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>
      <p class="text-sm text-rose-400">Gagal render preview: ${err.message}</p>`;
  }
}

// Ganti fungsi downloadQuotationPDF:
function downloadQuotationPDF() {
  // Prioritas: gunakan base64 dari server (template Sheet)
  if (_activePdfBase64) {
    const byteChars = atob(_activePdfBase64);
    const byteArr   = new Uint8Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) {
      byteArr[i] = byteChars.charCodeAt(i);
    }
    const blob = new Blob([byteArr], { type: 'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = _activePdfName || 'quotation.pdf';
    a.click();
    URL.revokeObjectURL(url);
    showNotification('PDF berhasil didownload: ' + _activePdfName);
    return;
  }
  // Fallback jsPDF
  if (_activePdfDoc) {
    _activePdfDoc.save(_activePdfName);
  }
}

    async function renderPDFKeCanvas(doc) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      const pdfBytes = doc.output('arraybuffer');
      const pdfDoc   = await pdfjsLib.getDocument({ data: pdfBytes }).promise;
      const wrap     = document.getElementById('preview-pdf-canvas-wrap');
      wrap.innerHTML = '';

      // Tampilkan wrap dulu agar clientWidth terukur, tapi masih transparan
      wrap.style.display = 'flex';
      wrap.style.flexDirection = 'column';
      wrap.style.visibility = 'hidden'; // tidak terlihat tapi sudah punya dimensi

      // Ambil lebar setelah wrap visible secara layout
      const wrapW = Math.min(wrap.clientWidth || 340, 700);

      for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
        const page     = await pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1 });
        const scale    = (wrapW - 16) / viewport.width;
        const vp       = page.getViewport({ scale });

        if (pdfDoc.numPages > 1) {
          const label     = document.createElement('p');
          label.innerText = `Halaman ${pageNum} / ${pdfDoc.numPages}`;
          label.style.cssText = 'font-size:11px;color:#94a3b8;font-weight:600;text-align:center;margin:0;';
          wrap.appendChild(label);
        }

        const canvas = document.createElement('canvas');
        canvas.width  = vp.width;
        canvas.height = vp.height;
        canvas.style.cssText = 'width:100%;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,0.5);background:#fff;display:block;';
        wrap.appendChild(canvas);

        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      }

      // Setelah semua halaman selesai, tampilkan dan sembunyikan loading
      wrap.style.visibility = 'visible';
      wrap.classList.remove('hidden');
      document.getElementById('preview-pdf-loading').classList.add('hidden');
    }

function buatDokumenPDF(item) {

    doc.setFillColor(...BLUE);
    doc.rect(ML, 10, 26, 10, 'F');

    const iy = 11;
    // Panah ke kanan atas (chevron)

    doc.triangle(ix + 2.5, iy + 7, ix + 5.5, iy + 3.5, ix + 5.5, iy + 7, 'F');
    // Batang horisontal tengah
    doc.setFillColor(255, 255, 255);
    doc.rect(ix, iy + 4.5, 5.5, 1.2, 'F');

    // Teks "RENUS" di dalam kotak biru
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9.5);
    doc.text('RENUS', ML + 16, 16.2, { align: 'center' });

    // Info perusahaan di bawah logo
    doc.setTextColor(...BLUE);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text('PT. RENUS GLOBAL INDONESIA', ML, 24);

    doc.setTextColor(50, 50, 50);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    doc.text('Penjaringan Asri X PS1 H/5, Kel. Penjaringan Sari', ML, 28);
    doc.text('Kec. Rungkut, Kota Surabaya 60293', ML, 32);
    doc.setTextColor(...BLUE);
    doc.text('Email : admin@renergynusantara | renergynusantara@gmail.com', ML, 36);
    doc.setTextColor(50, 50, 50);
    doc.text('Telp : 0895-6059-84308 | 0813-5820-8282', ML, 40);

    // ── HEADER KANAN: "Quotation" + info doc ──────────────────────────────
    doc.setTextColor(100, 100, 100);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(28);
    doc.text('Quotation', PW - MR, 20, { align: 'right' });

    const infoLX = PW - MR - 44;
    const infoRX = PW - MR;
    [
      ['Date',        item.tanggal   || ''],
      ['Quotation #', item.id        || ''],
      ['Rev',         String(item.rev ?? '0')],
    ].forEach((r, idx) => {
      const y = 28 + idx * 5;

      doc.setFont('helvetica', 'bold');
      doc.setTextColor(50, 50, 50);

      doc.setFont('helvetica', 'normal');
      doc.setTextColor(20, 20, 20);
      doc.text(r[1], infoRX, y, { align: 'right' });
    });

    // ── QUOTATION TO ───────────────────────────────────────────────────────

    doc.setTextColor(255, 255, 255);

    curY += 6;

    doc.setFillColor(248, 249, 252);
    doc.rect(ML, curY, CW, 26, 'F');
    doc.setDrawColor(210, 215, 230);
    doc.setLineWidth(0.2);
    doc.rect(ML, curY, CW, 26);

    const c1L = ML + 2;
    const c1V = ML + 30;
    const c2L = ML + (CW / 2) + 2;
    const c2V = PW - MR;

    const clientRows = [

        doc.setFont('helvetica', 'normal');
        doc.setTextColor(20, 20, 20);
        doc.text(r[3], c2V - 3, y, { align: 'right' });

    curY += 29;

    // ── TABEL ITEM ─────────────────────────────────────────────────────────

    kelompokList.forEach((k, ki) => {
      const letter = String.fromCharCode(65 + ki); // A, B, C, D...
      const isDiscount = (k.namaKelompok || '').toUpperCase().includes('DISCOUNT') ||
                         (k.namaKelompok || '').toUpperCase().includes('DISKON');

      // Baris header kelompok
      tableBody.push([
        {
          content: letter,
          styles: {
            fontStyle: 'bold',
            fillColor: isDiscount ? [255, 245, 245] : [235, 240, 255],
            textColor: isDiscount ? [160, 0, 0] : [10, 10, 10],
            fontStyle: isDiscount ? 'bolditalic' : 'bold',
          },
        },
        {
          content: k.namaKelompok,
          styles: {
            fontStyle: isDiscount ? 'bolditalic' : 'bold',
            fillColor: isDiscount ? [255, 245, 245] : [235, 240, 255],
            textColor: isDiscount ? [160, 0, 0] : [10, 10, 10],
          },
        },
        { content: '', styles: { fillColor: isDiscount ? [255, 245, 245] : [235, 240, 255] } },
        { content: '', styles: { fillColor: isDiscount ? [255, 245, 245] : [235, 240, 255] } },
        { content: '', styles: { fillColor: isDiscount ? [255, 245, 245] : [235, 240, 255] } },
        {

            fillColor: isDiscount ? [255, 245, 245] : [235, 240, 255],
            textColor: isDiscount ? [160, 0, 0] : [10, 10, 10],

      ]);

      // Baris sub-item
      k.subItems.forEach((s, si) => {
        const isNeg = (s.total || 0) < 0 || (s.harga || 0) < 0;

          { content: String(si + 1), styles: { halign: 'center', fontStyle: isNeg ? 'italic' : 'normal', textColor: isNeg ? [160, 0, 0] : [40, 40, 40] } },
          { content: s.deskripsi, styles: { fontStyle: isNeg ? 'italic' : 'normal', textColor: isNeg ? [160, 0, 0] : [40, 40, 40] } },

    doc.rect(ML, curY - 2, CW, tcTotalH);
    // Garis vertikal pemisah dua kolom
    doc.line(ML + tcItemW, curY - 2, ML + tcItemW, curY - 2 + tcTotalH);

    tcItems.forEach((tcItem, idx) => {
      const col = idx % tcColCount;
      const row = Math.floor(idx / tcColCount);
      const x   = ML + 3 + col * tcItemW;
      const y   = curY + 4 + row * tcRowH;

      doc.setFontSize(7.5);
      doc.setTextColor(60, 60, 60);

      // Label bold
      doc.setFont('helvetica', 'bold');
      const labelText = tcItem.label + ': ';
      doc.text(labelText, x, y);

      // Value normal, menyambung setelah label
      const labelW = doc.getTextWidth(labelText);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(20, 20, 20);

      // Wrap value jika terlalu panjang
      const maxValW = tcItemW - labelW - 5;
      const valLines = doc.splitTextToSize(tcItem.value, maxValW);
      doc.text(valLines, x + labelW, y);
    });

    curY += tcTotalH + 4;

    // ── FOOTER ─────────────────────────────────────────────────────────────
    if (curY > 255) { doc.addPage(); curY = 15; }

    doc.setDrawColor(210, 215, 230);
    doc.setLineWidth(0.3);
    doc.line(ML, curY, PW - MR, curY);
    curY += 5;

    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(80, 80, 80);
    doc.text(
      'If you have any questions concerning this quotation, contact Name, Phone Number, E-mail',
      ML, curY
    );

    doc.setFont('helvetica', 'bold');
    doc.setTextColor(30, 30, 30);
    doc.text('THANK YOU FOR YOUR BUSINESS!', ML, curY + 5);

    // Tanda tangan kanan
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(80, 80, 80);
    doc.text('Best Regard,', PW - MR, curY, { align: 'right' });

    const namaText = item.dibuatOleh || 'Sales Executive';
    const namaY    = curY + 12;
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(20, 20, 20);
    doc.text(namaText, PW - MR, namaY, { align: 'right' });

    // Underline nama
    const namaW = doc.getTextWidth(namaText);
    doc.setDrawColor(20, 20, 20);
    doc.setLineWidth(0.3);
    doc.line(PW - MR - namaW, namaY + 1, PW - MR, namaY + 1);

    // ── RENDER PREVIEW ──────────────────────────────────────────────────────
    const pdfName  = `Quotation_${item.id.replace(/\//g, '-')}_Rev${item.rev}.pdf`;
    _activePdfDoc  = doc;
    _activePdfName = pdfName;

    renderPDFKeCanvas(doc).catch(err => {
      document.getElementById('preview-pdf-loading').innerHTML = `
        <i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>
        <p class="text-sm text-rose-400">Gagal render preview: ${err.message}</p>`;
    });

  } catch (err) {
    console.error(err);
    document.getElementById('preview-pdf-loading').innerHTML =
      `<i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>
      <p class="text-sm text-rose-400">Gagal membuat PDF: ${err.message}</p>`;
    showNotification('Gagal generate PDF: ' + err.message, 'error');
  }
}
</script>
