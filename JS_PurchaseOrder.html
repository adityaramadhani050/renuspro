<script>
// ── Purchase Order Module ─────────────────────────────────────────────────────

let _cachedPOData   = [];
let _poFormMode     = 'new'; // 'new' | 'edit'
let _poItems        = [];
let _currentPODetail = null;

// ── Render tabel daftar PO ──────────────────────────────────────────────────
function _pgRenderPurchaseOrder(data) {
  var tbody = document.getElementById('table-purchaseorder');
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-slate-400"><i class="fas fa-inbox mr-2"></i>Belum ada data Purchase Order.</td></tr>';
    return;
  }
  var statusPOClass = {
    'Draft': 'bg-slate-100 text-slate-600',
    'Disetujui': 'bg-blue-100 text-blue-700',
    'Diterima Sebagian': 'bg-amber-100 text-amber-700',
    'Diterima': 'bg-teal-100 text-teal-700',
    'Selesai': 'bg-emerald-100 text-emerald-700',
    'Batal': 'bg-rose-100 text-rose-600'
  };
  var statusBayarClass = {
    'Belum Dibayar': 'bg-slate-100 text-slate-600',
    'Dibayar Sebagian': 'bg-amber-100 text-amber-700',
    'Lunas': 'bg-emerald-100 text-emerald-700'
  };
  tbody.innerHTML = data.map(function(po) {
    var sc = statusPOClass[po.statusPO] || 'bg-slate-100 text-slate-500';
    var bc = statusBayarClass[po.statusBayar] || 'bg-slate-100 text-slate-500';
    var isDraft = po.statusPO === 'Draft';
    return '<tr class="border-b border-slate-100 hover:bg-slate-50 transition text-sm">' +
      '<td class="p-4">' +
        '<div class="font-mono font-bold text-slate-700">' + (po.noPO || '') + '</div>' +
        '<div class="text-xs text-slate-400 mt-0.5">' + (po.tanggal || '') + '</div>' +
      '</td>' +
      '<td class="p-4 font-medium text-slate-800">' + (po.namaSupplier || po.idSupplier || '—') + '</td>' +
      '<td class="p-4 text-slate-500">' + (po.noWO || '—') + '</td>' +
      '<td class="p-4 text-center"><span class="text-xs font-extrabold px-2 py-1 rounded-lg ' + sc + '">' + (po.statusPO || '') + '</span></td>' +
      '<td class="p-4 text-right font-bold text-slate-800">Rp ' + ((po.grandTotal || 0).toLocaleString('id-ID')) + '</td>' +
      '<td class="p-4 text-center"><span class="text-xs font-extrabold px-2 py-1 rounded-lg ' + bc + '">' + (po.statusBayar || '—') + '</span></td>' +
      '<td class="p-4 text-center">' +
        '<div class="flex items-center justify-center gap-1">' +
          '<button onclick="bukaPODetail(\'' + (po.noPO || '').replace(/'/g, "\\'") + '\')" class="text-amber-600 hover:bg-amber-50 p-1.5 rounded-lg transition" title="Detail"><i class="fa-solid fa-eye text-sm"></i></button>' +
          '<button onclick="exportPOPDF(\'' + (po.noPO || '').replace(/'/g, "\\'") + '\')" class="text-blue-500 hover:bg-blue-50 p-1.5 rounded-lg transition" title="Export PDF"><i class="fa-solid fa-file-pdf text-sm"></i></button>' +
          (isDraft ? '<button onclick="konfirmasiHapus(\'po\',\'' + (po.noPO || '').replace(/'/g, "\\'") + '\',\'' + (po.noPO || '').replace(/'/g, "\\'") + '\')" class="text-rose-500 hover:bg-rose-50 p-1.5 rounded-lg transition" title="Hapus"><i class="fa-regular fa-trash-can text-sm"></i></button>' : '') +
        '</div>' +
      '</td>' +
    '</tr>';
  }).join('');
}

// ── Load daftar PO ──────────────────────────────────────────────────────────
window.loadPurchaseOrder = function() {
  if (typeof google === 'undefined') return;
  google.script.run
    .withSuccessHandler(function(data) {
      _cachedPOData = data || [];
      _pgState.purchaseorder.data = _cachedPOData;
      _pgState.purchaseorder.page = 1;
      _injectPgBar('purchaseorder', '#table-purchaseorder');
      _pgRender('purchaseorder');
    })
    .withFailureHandler(function() {
      document.getElementById('table-purchaseorder').innerHTML =
        '<tr><td colspan="7" class="p-6 text-center text-rose-400">Gagal memuat data PO.</td></tr>';
    })
    .getPOList();
};

// ── Filter PO ───────────────────────────────────────────────────────────────
window.filterPO = function() {
  var q      = (document.getElementById('search-po').value || '').toLowerCase().trim();
  var status = (document.getElementById('filter-po-status').value || '').trim();
  var filtered = _cachedPOData.filter(function(po) {
    if (q) {
      var hay = ((po.noPO || '') + (po.namaSupplier || '') + (po.noWO || '') + (po.peruntukan || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (status && po.statusPO !== status) return false;
    return true;
  });
  _pgState.purchaseorder.data = filtered;
  _pgState.purchaseorder.page = 1;
  _pgRender('purchaseorder');
};

// ── Form Buat/Edit PO ────────────────────────────────────────────────────────
function bukaFormPO() {
  _poFormMode = 'new';
  _poItems    = [];
  document.getElementById('form-po-title').innerText = 'Buat Purchase Order Baru';
  document.getElementById('po-no-field').value       = 'Auto-generate...';
  document.getElementById('po-edit-nopo') && (document.getElementById('po-edit-nopo').value = '');
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('po-tanggal').value   = today;
  document.getElementById('po-peruntukan').value = '';
  document.getElementById('po-ppn-persen').value = '11';
  if (document.getElementById('po-diskon-persen'))  document.getElementById('po-diskon-persen').value  = '0';
  if (document.getElementById('po-diskon-nominal')) document.getElementById('po-diskon-nominal').value = '';
  document.getElementById('po-catatan').value    = '';
  renderItemsPO();
  hitungTotalPO();

  // Populate supplier dropdown
  if (typeof google !== 'undefined') {
    google.script.run
      .withSuccessHandler(function(res) {
        var sel = document.getElementById('sel-supplier-po');
        sel.innerHTML = '<option value="">-- Pilih Supplier --</option>';
        (Array.isArray(res) ? res : (res.list || [])).filter(function(s){ return s.status === 'Aktif'; }).forEach(function(s) {
          var opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.namaAkun ? s.nama : (s.nama + (s.pic ? ' - ' + s.pic : ''));
          sel.appendChild(opt);
        });
        // init or refresh searchable dropdown
        var native = document.getElementById('sel-supplier-po');
        if (native) {
          if (native.dataset.sdInit === '1' && typeof sdRefresh === 'function') sdRefresh('sel-supplier-po');
          else if (typeof initSearchableDropdown === 'function') initSearchableDropdown('sel-supplier-po', { placeholder: '-- Pilih Supplier --' });
        }
      })
      .withFailureHandler(function() {})
      .getSupplierList();

    google.script.run
      .withSuccessHandler(function(data) {
        var sel = document.getElementById('sel-wo-po');
        sel.innerHTML = '<option value="">-- Tidak terikat WO --</option>';
        (data || []).filter(function(w) { return w.status !== 'Closed'; }).forEach(function(w) {
          var opt = document.createElement('option');
          opt.value = w.noWO;
          opt.textContent = w.noWO + ' – ' + (w.namaProject || w.namaKlien || '');
          sel.appendChild(opt);
        });
        var n2 = document.getElementById('sel-wo-po');
        if (n2) {
          if (n2.dataset.sdInit === '1' && typeof sdRefresh === 'function') sdRefresh('sel-wo-po');
          else if (typeof initSearchableDropdown === 'function') initSearchableDropdown('sel-wo-po', { placeholder: '-- Tidak terikat WO --' });
        }
      })
      .withFailureHandler(function() {})
      .getWorkOrderList();
  }

  document.getElementById('form-po-section').classList.remove('hidden');
  document.getElementById('panel-po-detail').classList.add('hidden');
  document.getElementById('po-list-section').classList.add('hidden');
}

function tutupFormPO() {
  document.getElementById('form-po-section').classList.add('hidden');
  document.getElementById('po-list-section').classList.remove('hidden');
}

// ── Items PO ─────────────────────────────────────────────────────────────────
function tambahItemPO() {
  _poItems.push({ namaItem: '', qty: 1, satuan: '', hargaBeli: 0, catatan: '' });
  renderItemsPO();
}

function hapusItemPO(idx) {
  _poItems.splice(idx, 1);
  renderItemsPO();
  hitungTotalPO();
}

// Format angka ribuan → "1.234.567"
function _fmtRp(n) { return (n || 0).toLocaleString('id-ID'); }
// Parse string berformat ribuan → angka
function _parseRp(s) { return parseFloat((s || '').replace(/\./g,'').replace(',','.')) || 0; }

function renderItemsPO() {
  var tbody = document.getElementById('po-items-body');
  if (!_poItems.length) {
    tbody.innerHTML = '<tr id="po-items-empty"><td colspan="6" class="px-4 py-6 text-center text-slate-400 text-sm italic">Klik "Tambah Item" untuk menambahkan item pembelian.</td></tr>';
    return;
  }
  tbody.innerHTML = _poItems.map(function(item, idx) {
    var total = (parseFloat(item.qty) || 0) * (parseFloat(item.hargaBeli) || 0);
    var hargaDisplay = item.hargaBeli ? _fmtRp(item.hargaBeli) : '';
    return '<tr class="border-b border-slate-100">' +
      // Nama item — lebar penuh
      '<td class="px-2 py-1.5"><input type="text" value="' + _escHtml(item.namaItem) + '" oninput="_poItemChange(' + idx + ',\'namaItem\',this.value)" placeholder="Nama item..." class="w-full px-2 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-orange-400 bg-white"></td>' +
      // Qty — lebar kecil
      '<td class="px-2 py-1.5"><input type="number" value="' + (item.qty || 1) + '" min="0" step="any" oninput="_poItemChange(' + idx + ',\'qty\',this.value);hitungTotalPO()" class="w-20 px-2 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-orange-400 bg-white text-center"></td>' +
      // Satuan — lebar kecil
      '<td class="px-2 py-1.5"><input type="text" value="' + _escHtml(item.satuan) + '" oninput="_poItemChange(' + idx + ',\'satuan\',this.value)" placeholder="pcs" class="w-20 px-2 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-orange-400 bg-white text-center"></td>' +
      // Harga — format currency
      '<td class="px-2 py-1.5"><input type="text" inputmode="numeric" value="' + hargaDisplay + '" oninput="_onHargaPoInput(this,' + idx + ')" placeholder="0" class="w-full px-2 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-orange-400 bg-white text-right font-medium"></td>' +
      '<td class="px-2 py-1.5 text-right font-semibold text-slate-700 text-sm whitespace-nowrap">Rp ' + _fmtRp(total) + '</td>' +
      '<td class="px-2 py-1.5 text-center"><button onclick="hapusItemPO(' + idx + ')" class="text-rose-400 hover:text-rose-600 p-1 rounded transition"><i class="fa-solid fa-trash-can text-xs"></i></button></td>' +
    '</tr>';
  }).join('');
}

function _onHargaPoInput(el, idx) {
  var raw = _parseRp(el.value);
  _poItems[idx].hargaBeli = raw;
  // format tampilan
  var pos = el.selectionStart;
  var oldLen = el.value.length;
  el.value = raw > 0 ? _fmtRp(raw) : '';
  var newLen = el.value.length;
  el.selectionStart = el.selectionEnd = pos + (newLen - oldLen);
  hitungTotalPO();
}

function _poItemChange(idx, field, val) {
  if (!_poItems[idx]) return;
  _poItems[idx][field] = field === 'qty' || field === 'hargaBeli' ? (parseFloat(val) || 0) : val;
}

function hitungTotalPO() {
  var subtotal = _poItems.reduce(function(s, item) {
    return s + (parseFloat(item.qty) || 0) * (parseFloat(item.hargaBeli) || 0);
  }, 0);

  var diskonPct = parseFloat((document.getElementById('po-diskon-persen') || {}).value) || 0;
  var diskonNomEl = document.getElementById('po-diskon-nominal');
  var diskonNom = diskonNomEl && diskonNomEl.value ? _parseRp(diskonNomEl.value) : Math.round(subtotal * diskonPct / 100);
  if (diskonNom > subtotal) diskonNom = subtotal;
  var setelahDiskon = subtotal - diskonNom;

  var ppnPct  = parseFloat((document.getElementById('po-ppn-persen') || {}).value) || 0;
  var ppn     = Math.round(setelahDiskon * ppnPct / 100);
  var grand   = setelahDiskon + ppn;

  if (document.getElementById('po-subtotal'))    document.getElementById('po-subtotal').innerText    = _fmtRp(subtotal);
  if (document.getElementById('po-ppn-display')) document.getElementById('po-ppn-display').innerText = _fmtRp(ppn);
  if (document.getElementById('po-grandtotal'))  document.getElementById('po-grandtotal').innerText  = _fmtRp(grand);
  // update total per baris tanpa re-render penuh
  var rows = document.querySelectorAll('#po-items-body tr');
  _poItems.forEach(function(item, idx) {
    if (rows[idx]) {
      var totalEl = rows[idx].querySelector('td:nth-child(5)');
      if (totalEl) totalEl.innerText = 'Rp ' + _fmtRp((parseFloat(item.qty)||0) * (parseFloat(item.hargaBeli)||0));
    }
  });
}

function _onDiskonNominalInput(el) {
  var subtotal = _poItems.reduce(function(s, item) {
    return s + (parseFloat(item.qty) || 0) * (parseFloat(item.hargaBeli) || 0);
  }, 0);
  var raw = _parseRp(el.value);
  // back-calculate pct
  var pct = subtotal > 0 ? Math.round(raw / subtotal * 10000) / 100 : 0;
  var diskonPctEl = document.getElementById('po-diskon-persen');
  if (diskonPctEl) diskonPctEl.value = pct;
  // format nominal
  var pos = el.selectionStart, oldLen = el.value.length;
  el.value = raw > 0 ? _fmtRp(raw) : '';
  var newLen = el.value.length;
  try { el.selectionStart = el.selectionEnd = pos + (newLen - oldLen); } catch(e){}
  hitungTotalPO();
}

// ── Submit PO ────────────────────────────────────────────────────────────────
function submitPO() {
  var idSupplier = (document.getElementById('sel-supplier-po').value || '').trim();
  if (!idSupplier) return showNotification('Pilih supplier terlebih dahulu.', 'error');
  if (!_poItems.length) return showNotification('Tambahkan minimal 1 item pembelian.', 'error');
  for (var i = 0; i < _poItems.length; i++) {
    if (!_poItems[i].namaItem) return showNotification('Nama item baris ' + (i+1) + ' tidak boleh kosong.', 'error');
  }

  var sel = document.getElementById('sel-supplier-po');
  var namaSupplier = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : idSupplier;

  var payload = {
    tanggal:      document.getElementById('po-tanggal').value,
    idSupplier:   idSupplier,
    namaSupplier: namaSupplier,
    peruntukan:   document.getElementById('po-peruntukan').value.trim(),
    noWO:         document.getElementById('sel-wo-po').value,
    ppnPersen:    parseFloat(document.getElementById('po-ppn-persen').value) || 0,
    diskonPersen: parseFloat((document.getElementById('po-diskon-persen') || {}).value) || 0,
    diskonNominal: _parseRp((document.getElementById('po-diskon-nominal') || {}).value || ''),
    catatan:      document.getElementById('po-catatan').value.trim(),
    items:        _poItems.map(function(it) {
      return { namaItem: it.namaItem, qty: it.qty || 0, satuan: it.satuan, hargaBeli: it.hargaBeli || 0, catatan: it.catatan || '' };
    }),
    dibuatOleh: _currentUser ? _currentUser.nama : ''
  };

  if (_poFormMode === 'edit') {
    var noPOEdit = document.getElementById('po-edit-nopo') ? document.getElementById('po-edit-nopo').value : '';
    payload.noPO      = noPOEdit;
    payload.diubahOleh = payload.dibuatOleh;
  }

  toggleLoader(true, _poFormMode === 'edit' ? 'Menyimpan perubahan PO...' : 'Menyimpan PO...');
  if (typeof google === 'undefined') { toggleLoader(false); return; }

  var fn = _poFormMode === 'edit' ? 'editPO' : 'simpanPO';
  google.script.run
    .withSuccessHandler(function(res) {
      toggleLoader(false);
      if (res.success) {
        showNotification(res.message);
        tutupFormPO();
        loadPurchaseOrder();
      } else {
        showNotification(res.message, 'error');
      }
    })
    .withFailureHandler(function(err) {
      toggleLoader(false);
      showNotification(err.message || 'Gagal menyimpan PO.', 'error');
    })
    [fn](payload);
}

// ── Detail PO ────────────────────────────────────────────────────────────────
function bukaPODetail(noPO) {
  if (typeof google === 'undefined') return;
  toggleLoader(true, 'Memuat detail PO...');
  google.script.run
    .withSuccessHandler(function(res) {
      toggleLoader(false);
      if (!res || !res.success) { showNotification(res.message || 'Gagal memuat detail.', 'error'); return; }
      _currentPODetail = res.po;
      _currentPODetail.items = res.items || [];
      _renderPODetail(res.po, res.items || [], res.pembayaran || []);
      document.getElementById('form-terima-po').classList.add('hidden');
      document.getElementById('panel-po-detail').classList.remove('hidden');
    })
    .withFailureHandler(function(err) {
      toggleLoader(false);
      showNotification(err.message || 'Gagal memuat detail.', 'error');
    })
    .getPODetail(noPO);
}

function tutupPanelPO() {
  _currentPODetail = null;
  document.getElementById('panel-po-detail').classList.add('hidden');
  document.getElementById('form-terima-po').classList.add('hidden');
}

function _renderPODetail(po, items, pembayaran) {
  var statusPOClass = {
    'Draft': 'bg-slate-100 text-slate-600',
    'Disetujui': 'bg-blue-100 text-blue-700',
    'Diterima Sebagian': 'bg-amber-100 text-amber-700',
    'Diterima': 'bg-teal-100 text-teal-700',
    'Selesai': 'bg-emerald-100 text-emerald-700',
    'Batal': 'bg-rose-100 text-rose-600'
  };
  var statusBayarClass = {
    'Belum Dibayar': 'bg-slate-100 text-slate-600',
    'Dibayar Sebagian': 'bg-amber-100 text-amber-700',
    'Lunas': 'bg-emerald-100 text-emerald-700'
  };

  document.getElementById('po-detail-nopo').innerText         = po.noPO || '';
  var badge = document.getElementById('po-detail-status-badge');
  badge.className = 'text-[11px] font-bold px-2.5 py-0.5 rounded-full ' + (statusPOClass[po.statusPO] || 'bg-slate-100 text-slate-600');
  badge.innerText = po.statusPO || '';

  document.getElementById('po-detail-subtitle').innerText    = 'Dibuat oleh ' + (po.dibuatOleh || '—') + ' pada ' + (po.dibuatPada || '—');
  document.getElementById('po-detail-tanggal').innerText     = po.tanggal || '—';
  document.getElementById('po-detail-supplier').innerText    = po.namaSupplier || po.idSupplier || '—';
  document.getElementById('po-detail-wo').innerText          = po.noWO || '—';
  document.getElementById('po-detail-peruntukan').innerText  = po.peruntukan || '—';

  var bayarBadge = document.getElementById('po-detail-status-bayar-badge');
  bayarBadge.className = 'font-bold text-xs px-2 py-0.5 rounded-full ' + (statusBayarClass[po.statusBayar] || 'bg-slate-100 text-slate-600');
  bayarBadge.innerText = po.statusBayar || '—';

  document.getElementById('po-detail-total-dibayar').innerText = 'Rp ' + ((po.totalDibayar || 0).toLocaleString('id-ID'));

  // Edit button visibility
  var btnEdit = document.getElementById('po-detail-btn-edit');
  if (btnEdit) btnEdit.classList.toggle('hidden', po.statusPO !== 'Draft');

  // Ubah status button: hide if Selesai or Batal
  var btnStatus = document.getElementById('po-detail-btn-status');
  if (btnStatus) btnStatus.classList.toggle('hidden', po.statusPO === 'Selesai' || po.statusPO === 'Batal');

  // Tombol Terima Barang: tampil jika Disetujui atau Diterima Sebagian
  var btnTerima = document.getElementById('po-detail-btn-terima');
  if (btnTerima) {
    var bisaTerima = po.statusPO === 'Disetujui' || po.statusPO === 'Diterima Sebagian';
    btnTerima.classList.toggle('hidden', !bisaTerima);
  }

  // Items
  var tbody = document.getElementById('po-detail-items');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="p-5 text-center text-slate-400 italic text-sm">Tidak ada item.</td></tr>';
  } else {
    tbody.innerHTML = items.map(function(it, idx) {
      var diterimaClass = it.qtyDiterima >= it.qty ? 'text-teal-600 font-bold' : (it.qtyDiterima > 0 ? 'text-amber-600 font-bold' : 'text-slate-400');
      return '<tr class="border-b border-slate-100">' +
        '<td class="px-3 py-2 text-center text-slate-400 text-xs">' + (idx + 1) + '</td>' +
        '<td class="px-3 py-2 font-medium text-slate-800">' + _escHtml(it.namaItem || '') + '</td>' +
        '<td class="px-3 py-2 text-center">' + (it.qty || 0) + '</td>' +
        '<td class="px-3 py-2 text-center ' + diterimaClass + '">' + (it.qtyDiterima || 0) + '</td>' +
        '<td class="px-3 py-2 text-center text-slate-500">' + _escHtml(it.satuan || '') + '</td>' +
        '<td class="px-3 py-2 text-right text-slate-700">Rp ' + ((it.hargaBeli || 0).toLocaleString('id-ID')) + '</td>' +
        '<td class="px-3 py-2 text-right font-bold text-slate-800">Rp ' + ((it.total || 0).toLocaleString('id-ID')) + '</td>' +
      '</tr>';
    }).join('');
  }

  // Summary
  var ppnPct = po.ppnPersen || 0;
  if (document.getElementById('po-detail-ppn-label')) document.getElementById('po-detail-ppn-label').innerText = ppnPct;
  if (document.getElementById('po-detail-subtotal'))  document.getElementById('po-detail-subtotal').innerText  = (po.subtotal || 0).toLocaleString('id-ID');
  if (document.getElementById('po-detail-ppn-nominal')) document.getElementById('po-detail-ppn-nominal').innerText = (po.ppnNominal || 0).toLocaleString('id-ID');
  if (document.getElementById('po-detail-grandtotal')) document.getElementById('po-detail-grandtotal').innerText = (po.grandTotal || 0).toLocaleString('id-ID');
  var diskonRow = document.getElementById('po-detail-diskon-row');
  if (diskonRow) {
    var hasDiskon = (po.diskonNominal || 0) > 0;
    diskonRow.classList.toggle('hidden', !hasDiskon);
    if (document.getElementById('po-detail-diskon-persen'))  document.getElementById('po-detail-diskon-persen').innerText  = po.diskonPersen || 0;
    if (document.getElementById('po-detail-diskon-nominal')) document.getElementById('po-detail-diskon-nominal').innerText = (po.diskonNominal || 0).toLocaleString('id-ID');
  }
  // find summary els in panel
  var els = document.querySelectorAll('#panel-po-detail .po-det-subtotal'); // fallback: use specific elements if present

  // Render pembayaran (read-only)
  _renderPembayaranPO(pembayaran);
}

function _renderPembayaranPO(pembayaran) {
  var tbody = document.getElementById('po-detail-payments');
  if (!pembayaran || !pembayaran.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-slate-400 italic">Belum ada riwayat pembayaran.</td></tr>';
    return;
  }
  tbody.innerHTML = pembayaran.map(function(p) {
    return '<tr class="border-b border-slate-100">' +

}

// ── Ubah Status PO ───────────────────────────────────────────────────────────
function ubahStatusPOUI(noPO, currentStatus) {
  if (!noPO) return;
  var statusMap = {
    'Draft': { next: 'Disetujui', label: 'Setujui PO' },
    'Disetujui': { next: 'Diterima', label: 'Tandai Diterima' },
    'Diterima': { next: 'Selesai', label: 'Selesaikan PO' }
  };
  var transition = statusMap[currentStatus];
  if (!transition) {
    showNotification('Status ' + currentStatus + ' tidak bisa diubah lagi.', 'error');
    return;
  }
  if (!confirm('Ubah status PO ' + noPO + ' dari "' + currentStatus + '" ke "' + transition.next + '"?')) return;
  toggleLoader(true, 'Mengubah status PO...');
  if (typeof google === 'undefined') { toggleLoader(false); return; }
  google.script.run
    .withSuccessHandler(function(res) {
      toggleLoader(false);
      if (res.success) {
        showNotification(res.message);
        loadPurchaseOrder();
        if (_currentPODetail && _currentPODetail.noPO === noPO) bukaPODetail(noPO);
      } else {
        showNotification(res.message, 'error');
      }
    })
    .withFailureHandler(function(err) {
      toggleLoader(false);
      showNotification(err.message || 'Gagal ubah status.', 'error');
    })
    .ubahStatusPO(noPO, transition.next, _currentUser ? _currentUser.nama : '');
}

function bukaEditPO(noPO) {
  if (!noPO) return;
  toggleLoader(true, 'Memuat data PO...');
  if (typeof google === 'undefined') { toggleLoader(false); return; }
  google.script.run
    .withSuccessHandler(function(res) {
      toggleLoader(false);
      if (!res || !res.success) { showNotification(res.message || 'Gagal.', 'error'); return; }
      var po    = res.po;
      var items = res.items || [];
      _poFormMode = 'edit';
      _poItems    = items.map(function(it) {
        return { namaItem: it.namaItem || '', qty: it.qty || 0, satuan: it.satuan || '', hargaBeli: it.hargaBeli || 0, catatan: it.catatan || '' };
      });

      document.getElementById('form-po-title').innerText    = 'Edit PO – ' + po.noPO;
      document.getElementById('po-no-field').value          = po.noPO;
      if (document.getElementById('po-edit-nopo')) document.getElementById('po-edit-nopo').value = po.noPO;

      if (document.getElementById('po-diskon-nominal')) document.getElementById('po-diskon-nominal').value = po.diskonNominal ? _fmtRp(po.diskonNominal) : '';
      document.getElementById('po-catatan').value    = po.catatan || '';

      renderItemsPO();
      hitungTotalPO();

      document.getElementById('panel-po-detail').classList.add('hidden');
      document.getElementById('form-po-section').classList.remove('hidden');
    })
    .withFailureHandler(function(err) {
      toggleLoader(false);
      showNotification(err.message || 'Gagal memuat PO.', 'error');

    .getPODetail(noPO);

function bukaFormBayarPO() {
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('po-bayar-tanggal').value = today;
  document.getElementById('po-bayar-jumlah').value  = '';
  document.getElementById('po-bayar-catatan').value = '';
  _loadAkunPembayaranOptions('sel-akun-po');
  document.getElementById('form-tambah-bayar-po').classList.remove('hidden');
}

function _loadAkunPembayaranOptions(selId) {
  if (typeof google === 'undefined') return;
  google.script.run
    .withSuccessHandler(function(res) {
      var sel = document.getElementById(selId);
      if (!sel) return;
      var list = (res && res.list) ? res.list : (Array.isArray(res) ? res : []);
      var aktif = list.filter(function(a){ return a.status === 'Aktif'; });
      sel.innerHTML = '<option value="">-- Pilih Akun --</option>';
      if (!aktif.length) {
        sel.innerHTML += '<option value="" disabled>Tambah akun pembayaran di Pengaturan</option>';
        return;
      }
      aktif.forEach(function(a) {
        var opt = document.createElement('option');
        opt.value = a.id;
        opt.dataset.nama = a.namaAkun;
        opt.textContent  = a.namaAkun + ' (' + a.tipe + ')';
        sel.appendChild(opt);
      });
    })
    .withFailureHandler(function(err) {
      var sel = document.getElementById(selId);
      if (sel) sel.innerHTML = '<option value="" disabled>Gagal memuat akun</option>';
    })
    .getAkunPembayaranList();
}

function submitPembayaranPO() {
  if (!_currentPODetail) return;
  var idAkun = document.getElementById('sel-akun-po').value;
  var sel    = document.getElementById('sel-akun-po');
  var namaAkun = sel.options[sel.selectedIndex] ? (sel.options[sel.selectedIndex].dataset.nama || sel.options[sel.selectedIndex].text) : '';
  var jumlah = parseFloat(document.getElementById('po-bayar-jumlah').value) || 0;
  var tanggalBayar = document.getElementById('po-bayar-tanggal').value;
  var catatan = document.getElementById('po-bayar-catatan').value.trim();

  if (!idAkun)     return showNotification('Pilih akun pembayaran.', 'error');
  if (!jumlah)     return showNotification('Jumlah pembayaran wajib diisi.', 'error');
  if (!tanggalBayar) return showNotification('Tanggal bayar wajib diisi.', 'error');

  // Convert date yyyy-MM-dd → dd/MM/yyyy
  var parts = tanggalBayar.split('-');
  var tglFormatted = parts.length === 3 ? parts[2] + '/' + parts[1] + '/' + parts[0] : tanggalBayar;

  var payload = {
    noPO:        _currentPODetail.noPO,
    tanggalBayar: tglFormatted,
    idAkun:      idAkun,
    namaAkun:    namaAkun,
    jumlah:      jumlah,
    catatan:     catatan,
    dibuatOleh:  _currentUser ? _currentUser.nama : ''
  };

  toggleLoader(true, 'Menyimpan pembayaran...');
  if (typeof google === 'undefined') { toggleLoader(false); return; }
  google.script.run
    .withSuccessHandler(function(res) {
      toggleLoader(false);
      if (res.success) {
        showNotification(res.message);
        document.getElementById('form-tambah-bayar-po').classList.add('hidden');
        bukaPODetail(_currentPODetail.noPO);
        loadPurchaseOrder();
      } else {
        showNotification(res.message, 'error');
      }
    })
    .withFailureHandler(function(err) {
      toggleLoader(false);
      showNotification(err.message || 'Gagal menyimpan pembayaran.', 'error');
    })
    .simpanPembayaranPO(payload);
}

// Cache daftar produk Material untuk dropdown form terima PO
var _produkMaterialCache = [];

function bukaFormTerimaPO() {
  if (!_currentPODetail) return;
  var noPO    = _currentPODetail.noPO;
  var formDiv = document.getElementById('form-terima-po');
  formDiv.classList.remove('hidden');

  var tbody = document.getElementById('form-terima-items');
  tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat...</td></tr>';

  // Load produk Material + PO items secara paralel
  var produkDone = false, itemsDone = false;
  var produkList = [], poItems = [], poItemsRes = null;

  function _tryRender() {
    if (!produkDone || !itemsDone) return;
    _produkMaterialCache = produkList;
    _renderFormTerimaItems(tbody, poItemsRes, produkList);
    formDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  google.script.run
    .withSuccessHandler(function(data) {
      produkList = (data || []).filter(function(p) { return p.tipe === 'Material'; });
      produkDone = true;
      _tryRender();
    })
    .withFailureHandler(function() { produkDone = true; _tryRender(); })
    .getProdukList();

  google.script.run
    .withSuccessHandler(function(res) {
      poItemsRes = res;
      itemsDone  = true;
      _tryRender();
    })
    .withFailureHandler(function(err) {
      tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-red-500">Error: ' + err.message + '</td></tr>';
    })
    .getPOItemsUntukPenerimaan(noPO);
}

function _renderFormTerimaItems(tbody, res, produkList) {
  if (!res || !res.success) {
    tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-red-500">' + _escHtml(res ? res.message : 'Gagal') + '</td></tr>';
    return;
  }
  var items = res.items || [];
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-400 italic">Tidak ada item yang bisa diterima.</td></tr>';
    return;
  }

  // Build dropdown options HTML sekali
  var optionsHtml = '<option value="">— Tidak terhubung ke stok —</option>' +
    produkList.map(function(p) {
      return '<option value="' + _escHtml(p.sku) + '">' + _escHtml(p.sku) + ' — ' + _escHtml(p.nama) + '</option>';
    }).join('');

  tbody.innerHTML = items.map(function(it) {
    var sisaClass = it.qtySisa <= 0 ? 'text-slate-300' : 'text-slate-700';
    var selectedOpt = optionsHtml.replace(
      'value="' + _escHtml(it.idProduk || '') + '"',
      'value="' + _escHtml(it.idProduk || '') + '" selected'
    );
    return '<tr class="border-b border-teal-50" data-id-item="' + _escHtml(it.idItem) + '">' +
      '<td class="px-3 py-2 text-sm font-medium text-slate-800">' + _escHtml(it.namaItem) + '</td>' +
      '<td class="px-3 py-2 text-center text-sm">' + it.qtyPesan + '</td>' +
      '<td class="px-3 py-2 text-center text-sm text-teal-600 font-bold">' + it.qtyDiterima + '</td>' +
      '<td class="px-3 py-2 text-center text-sm ' + sisaClass + '">' + it.qtySisa + '</td>' +
      '<td class="px-3 py-2 text-center">' +
        (it.qtySisa > 0
          ? '<input type="number" class="terima-qty-input w-24 px-2 py-1 text-sm border border-teal-300 rounded-lg text-center focus:outline-none focus:border-teal-500" min="0" max="' + it.qtySisa + '" value="0" data-sisa="' + it.qtySisa + '">'
          : '<span class="text-xs text-slate-300">Penuh</span>') +
      '</td>' +
      '<td class="px-3 py-2">' +
        '<select class="terima-idproduk-select w-full min-w-[200px] px-2 py-1.5 text-xs border border-slate-200 rounded-lg focus:outline-none focus:border-teal-400 bg-white text-slate-700">' +
          selectedOpt +
        '</select>' +
      '</td>' +
    '</tr>';
  }).join('');
}

function submitTerimaPO() {
  if (!_currentPODetail) return;
  var noPO  = _currentPODetail.noPO;
  var rows  = document.querySelectorAll('#form-terima-items tr[data-id-item]');
  var items = [];
  rows.forEach(function(row) {
    var idItem    = row.getAttribute('data-id-item');
    var qtyInput  = row.querySelector('.terima-qty-input');
    var idProduk  = (row.querySelector('.terima-idproduk-select') || {}).value || '';
    if (!qtyInput) return;
    var qty = parseFloat(qtyInput.value) || 0;
    if (qty <= 0) return;
    var sisa = parseFloat(qtyInput.getAttribute('data-sisa')) || 0;
    if (qty > sisa) {
      showNotification('Qty melebihi sisa untuk item ' + idItem, 'error');
      return;
    }
    // Cari nama item & harga dari baris
    var namaItem = (row.querySelector('td:first-child') || {}).innerText || '';
    items.push({ idItem: idItem, namaItem: namaItem, qty: qty, idProduk: idProduk.trim(),
      hargaBeli: (_currentPODetail && _currentPODetail.items
        ? ((_currentPODetail.items.find(function(i) { return i.idItem === idItem; }) || {}).hargaBeli || 0)
        : 0),
      satuan: ''
    });
  });

  if (!items.length) return showNotification('Masukkan qty yang akan diterima.', 'error');

  toggleLoader(true, 'Menyimpan penerimaan...');
  google.script.run
    .withSuccessHandler(function(res) {
      toggleLoader(false);
      if (res.success) {
        showNotification(res.message, 'success');
        document.getElementById('form-terima-po').classList.add('hidden');
        bukaPODetail(noPO);
      } else {
        showNotification(res.message, 'error');
      }
    })
    .withFailureHandler(function(err) {
      toggleLoader(false);
      showNotification('Error: ' + err.message, 'error');
    })
    .terimaPOItems({
      noPO: noPO, items: items,
      namaUser: (_currentUser && _currentUser.nama) || ''
    });
}

function _buatDokumenPOPDF(po, items) {
  try {
    var jsPDF = window.jspdf ? window.jspdf.jsPDF : null;
    if (!jsPDF) {
      document.getElementById('preview-pdf-loading').innerHTML =
        '<p class="text-sm text-rose-400">Library jsPDF tidak tersedia.</p>';
      return;
    }

    var doc  = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    var PW   = 210;
    var ML   = 14;
    var MR   = 14;
    var CW   = PW - ML - MR;
    var BLUE = [0, 51, 153];
    var rpNum = function(v) { return Math.round(Math.abs(v || 0)).toLocaleString('id-ID'); };

    // ── LOGO & HEADER PERUSAHAAN ─────────────────────────────────────────────
    doc.setFillColor(BLUE[0], BLUE[1], BLUE[2]);
    doc.rect(ML, 10, 26, 10, 'F');
    // ikon brand sederhana
    doc.setFillColor(255, 255, 255);
    var ix = ML + 2.5, iy = 11;
    doc.triangle(ix, iy+7, ix+3, iy+3.5, ix+3, iy+7, 'F');
    doc.triangle(ix+2.5, iy+7, ix+5.5, iy+3.5, ix+5.5, iy+7, 'F');
    doc.rect(ix, iy+4.5, 5.5, 1.2, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(9.5);
    doc.text('RENUS', ML+16, 16.2, { align:'center' });

    doc.setTextColor(BLUE[0],BLUE[1],BLUE[2]);
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.text('PT. RENUS GLOBAL INDONESIA', ML, 24);

    doc.setTextColor(50,50,50);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7.5);
    doc.text('Penjaringan Asri X PS1 H/5, Kel. Penjaringan Sari', ML, 28);
    doc.text('Kec. Rungkut, Kota Surabaya 60293', ML, 32);
    doc.setTextColor(BLUE[0],BLUE[1],BLUE[2]);
    doc.text('Email : admin@renergynusantara | renergynusantara@gmail.com', ML, 36);
    doc.setTextColor(50,50,50);
    doc.text('Telp : 0895-6059-84308 | 0813-5820-8282', ML, 40);

    // ── JUDUL KANAN ──────────────────────────────────────────────────────────
    doc.setTextColor(100,100,100);
    doc.setFont('helvetica','bold');
    doc.setFontSize(28);
    doc.text('Purchase Order', PW - MR, 20, { align:'right' });

    var infoLX = PW - MR - 50, infoRX = PW - MR;
    [
      ['Tanggal', po.tanggal || ''],
      ['No. PO',  po.noPO   || ''],
      ['Status',  po.statusPO || ''],
    ].forEach(function(r, idx) {
      var y = 28 + idx * 5;
      doc.setFontSize(8);
      doc.setFont('helvetica','bold');
      doc.setTextColor(50,50,50);
      doc.text(r[0], infoLX, y);
      doc.setFont('helvetica','normal');
      doc.setTextColor(20,20,20);
      doc.text(r[1], infoRX, y, { align:'right' });
    });

    // ── KEPADA SUPPLIER ──────────────────────────────────────────────────────
    var curY = 45;
    doc.setFillColor(BLUE[0],BLUE[1],BLUE[2]);
    doc.rect(ML, curY, CW, 6, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.text('Kepada Supplier :', ML+2, curY+4.2);
    curY += 6;

    doc.setFillColor(248,249,252);
    doc.rect(ML, curY, CW, 22, 'F');
    doc.setDrawColor(210,215,230);
    doc.setLineWidth(0.2);
    doc.rect(ML, curY, CW, 22);

    var c1L = ML+2, c1V = ML+32, c2L = ML+(CW/2)+2, c2V = PW-MR;
    var supplierRows = [
      ['Supplier',    po.namaSupplier || po.idSupplier || '—',  'No. PO',      po.noPO || ''],
      ['Peruntukan',  po.peruntukan || '—',                     'No. WO',      po.noWO || '—'],
      ['Dibuat Oleh', po.dibuatOleh || '—',                     'Tanggal',     po.tanggal || ''],
    ];
    supplierRows.forEach(function(r, idx) {
      var y = curY + 6 + idx * 5.5;
      doc.setFontSize(8);
      doc.setFont('helvetica','bold'); doc.setTextColor(70,70,70); doc.text(r[0], c1L, y);
      doc.setFont('helvetica','normal'); doc.setTextColor(20,20,20); doc.text(r[1], c1V, y);
      doc.setFont('helvetica','bold'); doc.setTextColor(70,70,70); doc.text(r[2], c2L+5, y);
      doc.setFont('helvetica','normal'); doc.setTextColor(20,20,20); doc.text(r[3], c2V-3, y, { align:'right' });
    });
    curY += 25;

    // ── TABEL ITEM ───────────────────────────────────────────────────────────
    var tableBody = items.map(function(it, i) {
      return [
        { content: String(i+1), styles: { halign:'center' } },
        it.namaItem || '',
        { content: String(it.qty || 0), styles: { halign:'center' } },
        { content: it.satuan || '', styles: { halign:'center' } },
        { content: rpNum(it.hargaBeli), styles: { halign:'right' } },
        { content: rpNum(it.total),     styles: { halign:'right', fontStyle:'bold' } },
      ];
    });

    doc.autoTable({
      startY: curY,
      head: [[
        { content: 'No.',           styles: { halign:'center' } },
        { content: 'Nama Item',     styles: { halign:'left'   } },
        { content: 'Qty',           styles: { halign:'center' } },
        { content: 'Satuan',        styles: { halign:'center' } },
        { content: 'Harga (IDR)',   styles: { halign:'center' } },
        { content: 'Total (IDR)',   styles: { halign:'center' } },
      ]],
      body: tableBody,
      theme: 'grid',
      margin: { left: ML, right: MR },
      columnStyles: {
        0: { cellWidth: 10, halign:'center' },
        1: { cellWidth: 'auto' },
        2: { cellWidth: 14, halign:'center' },
        3: { cellWidth: 16, halign:'center' },
        4: { cellWidth: 30, halign:'right' },
        5: { cellWidth: 32, halign:'right' },
      },
      headStyles: {
        fillColor: BLUE, textColor: [255,255,255],
        fontStyle:'bold', fontSize:8,
        lineColor:[255,255,255], lineWidth:0.3,
      },
      bodyStyles: {
        fontSize:7.5, textColor:[40,40,40],
        lineColor:[200,205,220], lineWidth:0.2, cellPadding:1.8,
      },
      alternateRowStyles: { fillColor:[255,255,255] },
      styles: { overflow:'linebreak' },
    });

    curY = doc.lastAutoTable.finalY + 4;

    // ── SUMMARY KALKULASI ────────────────────────────────────────────────────
    var subtotal    = po.subtotal     || 0;
    var diskonNom   = po.diskonNominal || 0;
    var diskonPct   = po.diskonPersen  || 0;
    var ppnNominal  = po.ppnNominal   || 0;
    var ppnPersen   = po.ppnPersen    || 0;
    var grandTotal  = po.grandTotal   || 0;

    var summaryLines = [];
    summaryLines.push({ label:'Subtotal',                  value:'Rp ' + rpNum(subtotal), bold:false, red:false, highlight:false });
    if (diskonNom > 0) summaryLines.push({ label:'Diskon (' + diskonPct + '%)', value:'- Rp ' + rpNum(diskonNom), bold:false, red:true, highlight:false });
    if (ppnNominal > 0) summaryLines.push({ label:'PPN ' + ppnPersen + '%', value:'Rp ' + rpNum(ppnNominal), bold:false, red:false, highlight:false });
    summaryLines.push({ label:'GRAND TOTAL', value:'Rp ' + rpNum(grandTotal), bold:true, red:false, highlight:true });

    var colLabelX = PW - MR - 60, colValX = PW - MR;
    var rowH = 6, sy = curY;
    var summaryBoxW = colValX - colLabelX;
    var totalSummaryH = summaryLines.length * rowH + 2;
    doc.setDrawColor(210,215,230); doc.setLineWidth(0.2);
    doc.rect(colLabelX, sy-1, summaryBoxW, totalSummaryH+1);

    summaryLines.forEach(function(row, idx) {
      var ry = sy + 1 + idx * rowH;
      if (row.highlight) {
        doc.setFillColor(235,240,255);
        doc.rect(colLabelX, ry-0.5, summaryBoxW, rowH+1, 'F');
        doc.setDrawColor(180,190,220); doc.setLineWidth(0.3);
        doc.line(colLabelX, ry-0.5, colLabelX+summaryBoxW, ry-0.5);
      }
      doc.setFontSize(8);
      if (row.bold)      { doc.setFont('helvetica','bold');   doc.setTextColor(BLUE[0],BLUE[1],BLUE[2]); }
      else if (row.red)  { doc.setFont('helvetica','normal'); doc.setTextColor(180,0,0); }
      else               { doc.setFont('helvetica','normal'); doc.setTextColor(50,50,50); }
      doc.text(row.label, colLabelX+3, ry+4);
      doc.text(row.value, colValX-2,   ry+4, { align:'right' });
    });
    curY = sy + totalSummaryH + 6;

    // ── CATATAN ──────────────────────────────────────────────────────────────
    if (po.catatan) {
      if (curY > 248) { doc.addPage(); curY = 15; }
      var catatanLines = doc.splitTextToSize('Catatan: ' + po.catatan, CW - 4);
      var catatanH = catatanLines.length * 4.2 + 6;
      doc.setFillColor(255,252,230);
      doc.rect(ML, curY, CW, catatanH, 'F');
      doc.setDrawColor(220,200,100); doc.setLineWidth(0.2);
      doc.rect(ML, curY, CW, catatanH);
      doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(100,80,0);
      doc.text(catatanLines, ML+2, curY+4.5);
      curY += catatanH + 6;
    }

    // ── TANDA TANGAN ─────────────────────────────────────────────────────────
    if (curY > 255) { doc.addPage(); curY = 15; }
    curY += 4;
    doc.setDrawColor(210,215,230); doc.setLineWidth(0.3);
    doc.line(ML, curY, PW-MR, curY);
    curY += 5;

    // Dua kolom tanda tangan
    var ttW = CW / 2 - 10;
    var ttCols = [
      { x: ML+5,       label:'Disiapkan Oleh',  nama: po.dibuatOleh || 'Procurement' },
      { x: PW-MR-ttW-5, label:'Disetujui Oleh', nama: 'Direktur' },
    ];
    ttCols.forEach(function(tt) {
      doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
      doc.text(tt.label, tt.x + ttW/2, curY, { align:'center' });
      doc.setFont('helvetica','bold'); doc.setTextColor(20,20,20);
      doc.text(tt.nama, tt.x + ttW/2, curY + 18, { align:'center' });
      var namaW = doc.getTextWidth(tt.nama);
      doc.setDrawColor(20,20,20); doc.setLineWidth(0.3);
      doc.line(tt.x + ttW/2 - namaW/2, curY+19, tt.x + ttW/2 + namaW/2, curY+19);
    });

    // ── RENDER KE MODAL PREVIEW ──────────────────────────────────────────────
    var fileName = 'PO_' + (po.noPO || '').replace(/\//g,'-') + '.pdf';
    _activePdfDoc  = doc;
    _activePdfName = fileName;
    _activePdfBase64 = null;

    renderPDFKeCanvas(doc).catch(function(err) {
      document.getElementById('preview-pdf-loading').innerHTML =
        '<i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>' +
        '<p class="text-sm text-rose-400">Gagal render preview: ' + err.message + '</p>';
    });

  } catch(err) {
    console.error(err);
    document.getElementById('preview-pdf-loading').innerHTML =
      '<i class="fa-solid fa-circle-exclamation text-rose-400 text-2xl mb-2"></i>' +
      '<p class="text-sm text-rose-400">Gagal generate PDF: ' + err.message + '</p>';
  }
}

// ── Cetak PO (stub) ──────────────────────────────────────────────────────────
function cetakPO(po) {
  if (!po || !po.noPO) return;
  exportPOPDF(po.noPO);
}

// ── Helper escHtml (gunakan yang sudah ada di JS_Settings jika tersedia) ─────
if (typeof _escHtml === 'undefined') {
  window._escHtml = function(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  };
}
</script>
