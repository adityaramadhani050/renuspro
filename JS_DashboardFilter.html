<script>
// ================================================================
// DASHBOARD FILTER BY DATE
// ================================================================
(function() {

  // State filter aktif
  window._dbFilter = {
    mode: 'thisMonth', // 'thisMonth' | 'lastMonth' | 'thisYear' | 'custom'
    from: null,        // Date object
    to:   null         // Date object
  };

  // ── Set preset ──────────────────────────────────────────────
  window.setDashboardPreset = function(mode) {
    window._dbFilter.mode = mode;

    // Update tombol aktif
    document.querySelectorAll('.db-preset-btn').forEach(function(btn) {
      btn.classList.remove('active');
    });
    const activeBtn = document.getElementById('db-preset-' + mode);
    if (activeBtn) activeBtn.classList.add('active');

    // Toggle custom range
    const customRange = document.getElementById('db-custom-range');
    if (mode === 'custom') {
      customRange.classList.remove('hidden');
      customRange.style.display = 'flex';
      return; // tunggu user klik Terapkan
    } else {
      customRange.classList.add('hidden');
    }

    // Hitung from & to berdasarkan mode
    const now = new Date();
    const y   = now.getFullYear();
    const m   = now.getMonth();

    if (mode === 'thisMonth') {
      window._dbFilter.from = new Date(y, m, 1);
      window._dbFilter.to   = new Date(y, m + 1, 0);
    } else if (mode === 'lastMonth') {
      const lm = m === 0 ? 11 : m - 1;
      const ly = m === 0 ? y - 1 : y;
      window._dbFilter.from = new Date(ly, lm, 1);
      window._dbFilter.to   = new Date(ly, lm + 1, 0);
    } else if (mode === 'thisYear') {
      window._dbFilter.from = new Date(y, 0, 1);
      window._dbFilter.to   = new Date(y, 11, 31);
    }

    _updatePeriodLabel();
    _dbRawCache = null;
    loadDashboard();
  };

  // ── Apply custom range ───────────────────────────────────────
  window.applyCustomDashboardFilter = function() {
    const fromVal = document.getElementById('db-date-from').value;
    const toVal   = document.getElementById('db-date-to').value;

    if (!fromVal || !toVal) {
      showNotification('Pilih tanggal awal dan akhir!', 'error');
      return;
    }
    if (fromVal > toVal) {
      showNotification('Tanggal awal tidak boleh lebih dari tanggal akhir!', 'error');
      return;
    }

    window._dbFilter.from = new Date(fromVal);
    window._dbFilter.to   = new Date(toVal);
    window._dbFilter.mode = 'custom';

    _updatePeriodLabel();
    _dbRawCache = null;
    loadDashboard();
  };

  // ── Label periode aktif ──────────────────────────────────────
  window._updatePeriodLabel = function() {
    var el = document.getElementById('db-period-label');
    if (!el) return;
    var params = (typeof _dbGetPeriodParams === 'function') ? _dbGetPeriodParams() : null;
    if (!params) { el.textContent = ''; return; }
    // Parse dd/MM/yyyy
    var parseLabel = function(s) {
      if (!s) return '';
      var p = s.split('/');
      if (p.length !== 3) return s;
      var d = new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
      return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    };
    el.textContent = parseLabel(params.dateFrom) + ' – ' + parseLabel(params.dateTo);
  };

  // Label diupdate oleh _dbLoad() setiap kali data dimuat

})();

function refreshDashboard() {
      // Animasi ikon refresh
      const btn = document.getElementById('db-refresh-btn');
      if (btn) btn.querySelector('i').classList.add('fa-spin');
      // Hapus cache → paksa fetch ulang
      _dbRawCache = null;
      loadDashboard(true);
      setTimeout(function() {
        if (btn) btn.querySelector('i').classList.remove('fa-spin');
      }, 1500);
    }
</script>
